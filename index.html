/* ── SPEECH ── */
function SpeechBtn({onText}) {
  const [on,setOn]=useState(false); const r=useRef(null);
  const toggle=()=>{
    if(on){r.current?.stop();setOn(false);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Bruk mikrofon-ikonet på tastaturet for diktering.");return;}
    const x=new SR();x.lang="nb-NO";x.continuous=true;x.interimResults=false;
    x.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)onText(e.results[i][0].transcript);}};
    x.onerror=()=>setOn(false);x.onend=()=>setOn(false);
    r.current=x;x.start();setOn(true);
  };
  return <button onClick={toggle} style={{padding:"5px 8px",borderRadius:6,fontSize:11,fontWeight:600,background:on?YX_RED:"#f0ede5",color:on?"#fff":"#666",animation:on?"rec 1s infinite":"none",whiteSpace:"nowrap",flexShrink:0}}>{on?"⏹":"🎙️"}</button>;
}

/* ── PHOTO ── */
function PhotoBtn({photos,onAdd,onRemove}){
  const ref=useRef();
  const hf=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>onAdd(ev.target.result);r.readAsDataURL(f);e.target.value="";};
  return(
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
      {(photos||[]).map((p,i)=>(<div key={i} style={{position:"relative",width:48,height:48,borderRadius:6,overflow:"hidden"}}><img src={p} style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>onRemove(i)} style={{position:"absolute",top:1,right:1,background:"rgba(0,0,0,.6)",color:"#fff",borderRadius:8,width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div>))}
      <button onClick={()=>ref.current?.click()} style={{width:48,height:48,borderRadius:6,border:"2px dashed #ccc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#999",background:"#fafaf7"}}>📷</button>
      <input ref={ref} type="file" accept="image/*" capture="environment" onChange={hf}/>
    </div>
  );
}

  ]},
];
const MAX_TOTAL=RFC.reduce((s,c)=>s+c.items.reduce((a,b)=>a+b.max,0),0);

/* ── MAIN APP ── */
function App(){
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [view,setView]=useState("login");
  const [stations,setStations]=useState([]);
  const [station,setStation]=useState(null);
  const [catIdx,setCatIdx]=useState(0);
  const [scores,setScores]=useState({});
  const [na,setNa]=useState({});
  const [notes,setNotes]=useState({});
  const [photos,setPhotos]=useState({});
  const [visitNote,setVisitNote]=useState("");
  const [visits,setVisits]=useState([]);
  const [selfEvals,setSelfEvals]=useState([]);
  const [showCamp,setShowCamp]=useState(false);
  const [showImg,setShowImg]=useState(null);
  const [loginEmail,setLoginEmail]=useState("");
  const [loginPw,setLoginPw]=useState("");
  const [loginErr,setLoginErr]=useState("");
  const [saving,setSaving]=useState(false);
  const [userLoc,setUserLoc]=useState(null);

  // Auth state
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadProfile(session.user.id);}
      else setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session){setUser(session.user);loadProfile(session.user.id);}
      else{setUser(null);setProfile(null);setView("login");setLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const loadProfile=async(uid)=>{
    const{data}=await sb.from("profiles").select("*").eq("id",uid).single();
    setProfile(data);
    if(data)await loadStations(data);
    setLoading(false);
    setView("home");
  };

  const loadStations=async(prof)=>{
    let q=sb.from("stations").select("*").order("name");
    // RLS handles filtering, but for stasjonsleder we only get their station
    const{data}=await q;
    setStations(data||[]);
    // Load visits
    const{data:v}=await sb.from("visits").select("*").order("created_at",{ascending:false}).limit(100);
    setVisits(v||[]);
    // Load self-evals separately
    const{data:se}=await sb.from("visits").select("*").eq("visit_role","sl").order("created_at",{ascending:false});
    setSelfEvals(se||[]);
    // Get user location for sorting
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(p=>setUserLoc({lat:p.coords.latitude,lng:p.coords.longitude}),()=>{});
    }
  };

  const login=async()=>{
    setLoginErr("");
    const{error}=await sb.auth.signInWithPassword({email:loginEmail,password:loginPw});
    if(error)setLoginErr(error.message);
  };

  const logout=async()=>{await sb.auth.signOut();};

  const activeMax=RFC.reduce((s,c)=>s+c.items.filter(i=>!na[i.id]).reduce((a,b)=>a+b.max,0),0);
  const totalScore=Object.entries(scores).filter(([k])=>!na[k]).reduce((s,[,v])=>s+(v||0),0);
  const totalPct=activeMax>0?Math.round(totalScore/activeMax*100):0;

  const submitVisit=async()=>{
    if(!station||!profile)return;
    setSaving(true);
    const visit={
      station_id:station.id,
      user_id:user.id,
      visit_role:profile.role==="regionssjef"?"rs":"sl",
      scores,na_items:Object.keys(na).filter(k=>na[k]),
      notes,visit_note:visitNote,
      total_score:totalScore,max_score:activeMax,pct:totalPct,
      photo_count:Object.values(photos).reduce((s,a)=>s+(a?.length||0),0),
    };
    const{error}=await sb.from("visits").insert(visit);
    setSaving(false);
    if(error){alert("Feil ved lagring: "+error.message);return;}
    // Refresh visits
    const{data:v}=await sb.from("visits").select("*").order("created_at",{ascending:false}).limit(100);
    setVisits(v||[]);
    setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);
    setView("done");
  };

  const getSE=(sid)=>selfEvals.find(v=>v.station_id===sid&&v.visit_role==="sl");
  const stationDist=(s)=>{
    if(!userLoc||!s.lat||!s.lng)return 99999;
    const R=6371,dLat=(s.lat-userLoc.lat)*Math.PI/180,dLon=(s.lng-userLoc.lng)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(userLoc.lat*Math.PI/180)*Math.cos(s.lat*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };
  const sortedStations=userLoc?[...stations].sort((a,b)=>stationDist(a)-stationDist(b)):stations;
  const role=profile?.role;
  const isRS=role==="regionssjef";
  const isSL=role==="stasjonsleder";
  const isLeder=role==="leder";

  /* ── LOADING ── */
  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:YX_DARK}}>
      <img src={LOGO_W} alt="YX" style={{height:80,marginBottom:16}}/>
      <div className="loader"/>
    </div>
  );

  /* ── LOGIN ── */
  if(view==="login"||!user)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:YX_DARK,padding:32}}>
      <img src={LOGO_W} alt="YX" style={{height:80,marginBottom:12}}/>
      <div style={{color:YX_RED,fontSize:14,fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Klar for Kunde</div>
      <div style={{color:"#8899aa",fontSize:12,fontStyle:"italic",marginBottom:40}}>Din stasjon.</div>
      <div style={{width:"100%",maxWidth:320}}>
        <input type="email" placeholder="E-post" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}
          style={{width:"100%",padding:"14px 16px",borderRadius:10,background:"#1a3050",color:"#fff",border:"1px solid #2a4060",marginBottom:10,fontSize:16}}/>
        <input type="password" placeholder="Passord" value={loginPw} onChange={e=>setLoginPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&login()}
          style={{width:"100%",padding:"14px 16px",borderRadius:10,background:"#1a3050",color:"#fff",border:"1px solid #2a4060",marginBottom:16,fontSize:16}}/>
        {loginErr&&<div style={{color:"#f87171",fontSize:12,marginBottom:10,textAlign:"center"}}>{loginErr}</div>}
        <button onClick={login} style={{width:"100%",padding:"14px",background:YX_RED,color:"#fff",borderRadius:10,fontWeight:800,fontSize:16}}>Logg inn</button>
      </div>
    </div>
  );

  /* ── HOME ── */
  if(view==="home")return(
    <div style={{padding:"20px 20px 40px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:8}}>
        <img src={LOGO_C} alt="YX" style={{height:32}}/>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#999"}}>{profile?.name}</span>
          <button onClick={logout} style={{fontSize:11,color:YX_RED,fontWeight:600}}>Logg ut</button>
        </div>
      </div>
      <div style={{background:YX_RED+"10",border:`1px solid ${YX_RED}33`,borderRadius:10,padding:"10px 14px",margin:"16px 0",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:11,fontWeight:700,color:YX_RED,background:YX_RED+"20",padding:"2px 8px",borderRadius:4}}>{isRS?"Regionssjef":isSL?"Stasjonsleder":"Leder"}</span>
        <span style={{fontSize:12,color:"#666"}}>{isRS?"Coaching-besøk":isSL?"Selvevaluering":"Oversikt"}</span>
      </div>
      <h2 style={{fontSize:20,fontWeight:800,margin:"8px 0 12px",color:YX_DARK}}>{isSL?"Din stasjon":"Velg stasjon"}</h2>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sortedStations.map(s=>{
          const myV=visits.filter(v=>v.station_id===s.id);
          const last=myV[0];
          const se=getSE(s.id);
          const dist=userLoc&&s.lat?stationDist(s):null;
          return(
            <button key={s.id} onClick={()=>{setStation(s);setView("audit");}} style={{background:"#fff",border:"1px solid #eae7df",borderRadius:12,padding:"14px 16px",textAlign:"left"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:600,fontSize:15,color:YX_DARK}}>{s.name}</div>
                  <div style={{fontSize:11,color:"#999",marginTop:2}}>
                    {s.address}, {s.postnr} {s.poststed}
                    {dist!==null&&dist<999&&<span style={{marginLeft:6,color:"#0B326B",fontWeight:600}}>{dist<1?`${Math.round(dist*1000)}m`:`${dist.toFixed(1)}km`}</span>}
                  </div>
                </div>
                {last&&<div style={{background:sc(last.pct),color:"#fff",padding:"3px 8px",borderRadius:6,fontSize:12,fontWeight:700}}>{last.pct}%</div>}
              </div>
              {isRS&&se&&<div style={{fontSize:10,color:"#0B326B",marginTop:4}}>📋 Egenvurdering: {se.pct}%</div>}
            </button>
          );
        })}
      </div>
    </div>
  );

  /* ── AUDIT ── */
  if(view==="audit"&&station){
    const cat=RFC[catIdx];
    const catItems=cat.items.filter(i=>!na[i.id]);
    const catMax=catItems.reduce((s,i)=>s+i.max,0);
    const catScore=catItems.reduce((s,i)=>s+(scores[i.id]||0),0);
    const isLast=catIdx===RFC.length-1;
    const se=isRS?getSE(station.id):null;

    return(
      <div style={{paddingBottom:120}}>
        <div style={{background:YX_DARK,color:"#fff",padding:"14px 18px",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <button onClick={()=>{setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setView("home");}} style={{color:"#aaa",fontSize:13}}>← Avbryt</button>
            <span style={{fontSize:11,color:"#7799bb"}}>{station.name} · {catIdx+1}/{RFC.length}</span>
          </div>
          <div style={{fontSize:18,fontWeight:800}}>{cat.icon} {cat.name}</div>
          <div style={{fontSize:12,color:"#8899aa",marginTop:3}}>{cat.intro}</div>
          <div style={{height:4,background:"#1a3050",borderRadius:2,marginTop:8,overflow:"hidden"}}>
            <div style={{height:"100%",background:YX_RED,width:`${(catIdx+1)/RFC.length*100}%`,transition:"width .3s"}}/>
          </div>
        </div>

        <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {cat.items.map(item=>{
            const val=scores[item.id]??null;
            const isNa=na[item.id];
            const opts=scoreOpts(item.max);
            const seScore=se?.scores?.[item.id];
            const seNa=se?.na_items?.includes(String(item.id));
            const seLabel=seScore!==undefined&&!seNa?labelFor(item.max,seScore):null;
            const myLabel=val!==null&&!isNa?labelFor(item.max,val):null;
            const hasGap=isRS&&seLabel&&myLabel&&seLabel.c!==myLabel.c;

            return(
              <div key={item.id} style={{background:isNa?"#f9f9f6":"#fff",border:"1px solid #eae7df",borderRadius:12,padding:"12px",opacity:isNa?.5:1}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:YX_DARK,lineHeight:1.35}}>{item.text}</div>

                {isRS&&seLabel&&!isNa&&(
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,padding:"5px 8px",background:"#f0f7ff",borderRadius:6}}>
                    <span style={{fontSize:11,color:"#555"}}>Stasjonen:</span>
                    <span style={{background:seLabel.c+"22",color:seLabel.c,padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:700}}>{seLabel.l}</span>
                  </div>
                )}

                {!isNa&&(
                  <div style={{display:"flex",gap:5,marginBottom:6}}>
                    {opts.map(o=>(
                      <button key={o.v} onClick={()=>setScores(s=>({...s,[item.id]:o.v}))}
                        style={{flex:1,padding:"9px 4px",borderRadius:8,background:val===o.v?o.c:"#f5f3ee",color:val===o.v?"#fff":"#777",fontSize:11,fontWeight:700,textAlign:"center",border:val===o.v?"none":"1px solid #eae7df"}}>{o.l}</button>
                    ))}
                  </div>
                )}

                <button onClick={()=>{setNa(n=>({...n,[item.id]:!isNa}));if(!isNa)setScores(s=>{const n={...s};delete n[item.id];return n;});}}
                  style={{fontSize:10,color:isNa?YX_RED:"#bbb",fontWeight:600,marginBottom:4,padding:"3px 0"}}>{isNa?"↩ Gjør aktuell":"Ikke aktuell"}</button>

                {hasGap&&!isNa&&(
                  <div style={{fontSize:11,padding:"4px 8px",borderRadius:4,marginBottom:4,background:"#fef2f2",color:"#991b1b"}}>
                    ⚠️ Gap: stasjonen «{seLabel.l}», du «{myLabel.l}»
                  </div>
                )}

                {isRS&&!isNa&&<div style={{background:"#fef5f5",borderLeft:`3px solid ${YX_RED}`,padding:"6px 8px",borderRadius:4,fontSize:11,color:"#555",marginBottom:4}}>💬 {item.talk}</div>}

                {!isNa&&(
                  <div style={{display:"flex",alignItems:"flex-start",gap:4,marginTop:4}}>
                    <textarea placeholder="Notat" value={notes[item.id]||""} onChange={e=>setNotes(n=>({...n,[item.id]:e.target.value}))}
                      style={{flex:1,minHeight:32,border:"1px solid #f0ede5",borderRadius:6,padding:"6px 8px",fontSize:13,color:"#444",background:"#fafaf7"}}/>
                    <SpeechBtn onText={t=>setNotes(n=>({...n,[item.id]:(n[item.id]||"")+(n[item.id]?" ":"")+t}))}/>
                  </div>
                )}
                {!isNa&&<PhotoBtn photos={photos[item.id]||[]} onAdd={d=>setPhotos(p=>({...p,[item.id]:[...(p[item.id]||[]),d]}))} onRemove={idx=>setPhotos(p=>({...p,[item.id]:(p[item.id]||[]).filter((_,i)=>i!==idx)}))}/>}
              </div>
            );
          })}

          {isLast&&(
            <div style={{background:"#fff",border:"2px solid #eae7df",borderRadius:12,padding:"12px",marginTop:4}}>
              <div style={{fontSize:13,fontWeight:700,color:YX_DARK,marginBottom:6}}>📝 Oppsummering</div>
              <div style={{display:"flex",gap:4}}>
                <textarea placeholder="Avtaler, oppfølging..." value={visitNote} onChange={e=>setVisitNote(e.target.value)}
                  style={{flex:1,minHeight:70,border:"1px solid #f0ede5",borderRadius:6,padding:"8px",fontSize:13,color:"#444",background:"#fafaf7"}}/>
                <SpeechBtn onText={t=>setVisitNote(v=>(v?v+" ":"")+t)}/>
              </div>
            </div>
          )}
        </div>

        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #eae7df",padding:"10px 16px",maxWidth:520,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,fontSize:12,color:"#666"}}>
            <span>{catScore}/{catMax}</span>
            <span style={{fontWeight:700}}>{totalScore}/{activeMax} ({totalPct}%)</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            {catIdx>0&&<button onClick={()=>setCatIdx(i=>i-1)} style={{flex:1,padding:"13px",background:"#f5f3ee",borderRadius:10,fontWeight:600,color:"#444",fontSize:14}}>←</button>}
            {!isLast?<button onClick={()=>setCatIdx(i=>i+1)} style={{flex:2,padding:"13px",background:YX_DARK,color:"#fff",borderRadius:10,fontWeight:700,fontSize:14}}>Neste →</button>
            :<button onClick={submitVisit} disabled={saving} style={{flex:2,padding:"13px",background:YX_RED,color:"#fff",borderRadius:10,fontWeight:800,fontSize:14,opacity:saving?.6:1}}>{saving?"Lagrer...":"Fullfør ✓"}</button>}
          </div>
        </div>
      </div>
    );
  }

  /* ── DONE ── */
  if(view==="done"){
    const v=visits[0];
    if(!v)return null;
    const se=isRS?getSE(v.station_id):null;
    const sName=stations.find(s=>s.id===v.station_id)?.name||"";
    return(
      <div style={{padding:"60px 24px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:80,height:80,borderRadius:40,background:sc(v.pct),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,marginBottom:16}}>✓</div>
        <div style={{fontSize:12,color:"#888",letterSpacing:1,textTransform:"uppercase"}}>{isRS?"Coaching-besøk":"Selvevaluering"} registrert</div>
        <div style={{fontSize:22,fontWeight:800,marginTop:6,color:YX_DARK}}>{sName}</div>
        <div style={{fontSize:56,fontWeight:900,color:sc(v.pct),marginTop:16,lineHeight:1}}>{v.pct}%</div>
        {se&&isRS&&(
          <div style={{marginTop:14,padding:"10px 20px",background:"#f0f7ff",borderRadius:10,fontSize:13}}>
            <div style={{color:"#555"}}>Egenvurdering: <b style={{color:"#0B326B"}}>{se.pct}%</b></div>
            <div style={{fontSize:11,color:"#888",marginTop:4}}>Gap: {Math.abs(v.pct-se.pct)}pp</div>
          </div>
        )}
        <div style={{fontSize:12,color:"#999",marginTop:10}}>Lagret i database ✓</div>
        <button onClick={()=>setView("home")} style={{marginTop:32,padding:"13px 28px",background:YX_DARK,color:"#fff",borderRadius:10,fontWeight:700,fontSize:14}}>Tilbake</button>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
