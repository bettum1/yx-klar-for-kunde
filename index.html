<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overscroll-behavior:none}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#FAFAFA;color:#111;
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    letter-spacing:-0.01em;
  }
  #root{min-height:100vh;max-width:720px;margin:0 auto;background:#FFFFFF;position:relative}
  @media(min-width:768px){
    #root{max-width:720px;box-shadow:0 0 0 1px #F0F0F0}
    body{background:#F5F5F5}
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  textarea,input,select{font-family:inherit;font-size:15px;border:none;outline:none;background:transparent;color:inherit;resize:none}
  input[type="file"]{display:none}
  h1,h2,h3{font-weight:600;letter-spacing:-0.02em;color:#111}
  p{color:#4A4A4A}

  /* Focus states — subtle, not rainbow */
  button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{
    outline:2px solid #111;outline-offset:2px;border-radius:4px;
  }

  @keyframes rec{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .loader{width:24px;height:24px;border:2px solid #E5E5E5;border-top-color:#111;border-radius:50%;animation:spin .6s linear infinite}
  .fadeIn{animation:fadeIn .2s ease-out}

  /* Inline SVG icon defaults */
  svg{display:inline-block;vertical-align:middle;flex-shrink:0}
</style>

/* ── Voice: seamless speech-to-text, single button ── */
function Voice({onText}){
  const[state,setState]=useState('idle'); // idle|listen|fallback
  const[interim,setInterim]=useState('');
  const rRef=useRef(null);const mRef=useRef(null);const chunks=useRef([]);const tRef=useRef(null);const[dur,setDur]=useState(0);
  const listening=useRef(false);

  const stop=()=>{
    listening.current=false;
    if(rRef.current){try{rRef.current.stop();}catch(e){}}
    if(mRef.current&&mRef.current.state==='recording'){mRef.current.stop();}
    clearInterval(tRef.current);
    rRef.current=null;setState('idle');setInterim('');setDur(0);
  };

  const start=()=>{
    if(state!=='idle'){stop();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      try{
        const r=new SR();
        r.lang='nb-NO';r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
        r.onresult=e=>{
          let fin='',tmp='';
          for(let i=0;i<e.results.length;i++){
            if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';
            else tmp+=e.results[i][0].transcript;
          }
          if(fin.trim()&&onText)onText(fin.trim());
          setInterim(tmp);
        };
        r.onerror=e=>{
          if(e.error==='not-allowed'){alert('Gi tilgang til mikrofon i nettleserinnstillingene.');stop();return;}
          stop();startRecording();
        };
        r.onend=()=>{
          // Safari stops after silence — auto-restart if still listening
          if(listening.current){try{r.start();}catch(e){stop();}}
          else{setState('idle');setInterim('');}
        };
        rRef.current=r;listening.current=true;r.start();setState('listen');
      }catch(e){startRecording();}
    }else{startRecording();}
  };

  const startRecording=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
      const mr=new MediaRecorder(stream,{mimeType:mime});
      chunks.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunks.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        if(chunks.current.length>0){
          const blob=new Blob(chunks.current,{type:mime});
          transcribeAudio(blob);
        }
        clearInterval(tRef.current);setState('idle');setDur(0);
      };
      mRef.current=mr;mr.start();setState('fallback');setDur(0);
      tRef.current=setInterval(()=>setDur(d=>d+1),1000);
    }catch(e){alert('Kunne ikke starte mikrofon. Sjekk tillatelser.');}
  };

  const transcribeAudio=async(blob)=>{
    // Try to transcribe via Supabase Edge Function or show instruction
    setInterim('Bearbeider...');
    try{
      const formData=new FormData();
      formData.append('file',blob,'audio.webm');
      formData.append('model','whisper-large-v3-turbo');
      formData.append('language','no');
      formData.append('response_format','text');
      // Try Groq free Whisper endpoint
      const resp=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{
        method:'POST',headers:{'Authorization':'Bearer gsk_placeholder'},body:formData
      });
      if(resp.ok){const text=await resp.text();if(text.trim()&&onText)onText(text.trim());}
      else{if(onText)onText('[Lydopptak '+dur+'s — bruk tastatur-mikrofon for tekst]');}
    }catch(e){
      if(onText)onText('[Lydopptak '+dur+'s]');
    }
    setInterim('');
  };

  const stopFallback=()=>{if(mRef.current&&mRef.current.state==='recording')mRef.current.stop();};

  return(
    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>

/* ── Camera with Supabase Storage upload ── */
async function uploadPhoto(file,userId){
  // Compress image before upload (max 1600px, 80% quality)
  const compressed=await compressImage(file);
  const ext=file.name.split('.').pop()||'jpg';
  const path=`${userId}/${Date.now()}-${Math.random().toString(36).slice(2,9)}.${ext}`;
  const{data,error}=await sb.storage.from('visit-photos').upload(path,compressed,{contentType:file.type||'image/jpeg',upsert:false});
  if(error)throw error;
  const{data:urlData}=sb.storage.from('visit-photos').getPublicUrl(path);
  return{path:data.path,url:urlData.publicUrl};
}

async function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=1600,maxH=1600;
        let w=img.width,h=img.height;
        if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w*=r;h*=r;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('Compress failed')),'image/jpeg',.8);
      };
      img.onerror=reject;img.src=e.target.result;
    };
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}

function Cam({photos,onAdd,onRemove,userId}){
  const ref=useRef();
  const[uploading,setUploading]=useState(false);
  const h=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    e.target.value="";
    if(!navigator.onLine){
      alert("Du er offline. Bilder kan ikke lastes opp nå. Ta notat i stedet, så fikser vi bilde når du er online.");
      return;
    }
    setUploading(true);
    try{
      const{path,url}=await uploadPhoto(f,userId);
      onAdd({path,url,thumb:url});
    }catch(err){
      console.error('Upload failed:',err);
      alert('Kunne ikke laste opp bilde: '+(err.message||'ukjent feil')+'\n\nSjekk at storage-policy er satt i Supabase.');
    }finally{setUploading(false);}
  };
  return(
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
      {(photos||[]).map((p,i)=>(
        <div key={i} style={{position:"relative",width:64,height:64,borderRadius:8,overflow:"hidden",border:"2px solid #eae7df"}}>
          <img src={p.thumb||p.url||p} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="Bevis"/>
          <button onClick={()=>onRemove(i)} aria-label="Slett bilde" style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.75)",color:"#fff",borderRadius:10,width:22,height:22,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
      ))}
      <button onClick={()=>ref.current?.click()} disabled={uploading} aria-label="Ta bilde" style={{width:64,height:64,borderRadius:8,border:"2px dashed #bbb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#888",background:"#fafaf7",opacity:uploading?.5:1}}>
        {uploading?<div className="loader" style={{width:18,height:18,borderWidth:2,borderColor:"#ccc",borderTopColor:R}}/>:"📷"}
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" onChange={h}/>
    </div>
  );
}

/* ── Autosave helpers (user-scoped) ── */
const DRAFT_KEY='yx_kfk_draft';
function saveDraft(userId,station,scores,na,notes,photos,visitNote,catIdx,includeHms){
  if(!station||!userId)return;
  try{
    localStorage.setItem(DRAFT_KEY+'_'+userId,JSON.stringify({
      stationId:station.id,stationName:station.name,userId,
      scores,na,notes,photos,visitNote,catIdx,includeHms,
      savedAt:Date.now()
    }));
  }catch(e){console.warn('Autosave failed:',e);}
}
function loadDraft(userId){
  if(!userId)return null;
  try{const d=localStorage.getItem(DRAFT_KEY+'_'+userId);return d?JSON.parse(d):null;}
  catch(e){return null;}
}
function clearAutosave(userId){
  if(!userId)return;
  try{localStorage.removeItem(DRAFT_KEY+'_'+userId);}catch(e){}
}

/* ── Offline cache ── */
const CACHE_KEY='yx_kfk_cache';
const QUEUE_KEY='yx_kfk_queue';

function saveCache(stations,visits){
  try{
    const data={stations,visits:visits.slice(0,100),savedAt:Date.now()};
    localStorage.setItem(CACHE_KEY,JSON.stringify(data));
  }catch(e){console.warn('Cache save failed:',e);}
}
function loadCache(){
  try{const d=localStorage.getItem(CACHE_KEY);return d?JSON.parse(d):null;}
  catch(e){return null;}
}
function queueVisit(visit){
  try{
    const q=JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');
    q.push({...visit,queuedAt:Date.now(),id:'local-'+Date.now()});
    localStorage.setItem(QUEUE_KEY,JSON.stringify(q));
    return true;
  }catch(e){return false;}
}
function getQueue(){
  try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');}catch(e){return[];}
}
function clearFromQueue(localId){
  try{
    const q=JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');
    localStorage.setItem(QUEUE_KEY,JSON.stringify(q.filter(v=>v.id!==localId)));
  }catch(e){}
}

/* ── Error Boundary — prevents full app crash ── */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error('App crashed:',err,info);}
  render(){
    if(this.state.err){
      return(
        <div style={{minHeight:"100vh",background:"#0C2340",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
          <div style={{fontSize:64,marginBottom:20}}>⚠️</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:12}}>Noe gikk galt</div>
          <div style={{color:"rgba(255,255,255,.6)",fontSize:14,marginBottom:32,maxWidth:400}}>Appen har møtt en feil. Arbeidet ditt er automatisk lagret. Trykk under for å laste inn på nytt.</div>
          <button onClick={()=>window.location.reload()} style={{padding:"15px 32px",background:"#CF122D",color:"#fff",borderRadius:12,fontWeight:700,fontSize:15,border:"none"}}>Last inn på nytt</button>
          <div style={{color:"rgba(255,255,255,.3)",fontSize:11,marginTop:24,maxWidth:400,fontFamily:"monospace"}}>{String(this.state.err.message||this.state.err)}</div>
        </div>
      );
    }
    return this.props.children;
  }
}

  const tScore=Object.entries(scores).filter(([k])=>!na[k]).reduce((s,[,v])=>s+(v||0),0);
  const tPct=aMax>0?Math.round(tScore/aMax*100):0;

  const submit=async()=>{
    if(!station||!profile)return;setSaving(true);
    const photoCount=Object.values(photos).reduce((s,a)=>s+(a?.length||0),0);
    const v={station_id:station.id,user_id:user.id,visit_role:profile.role==="regionssjef"?"rs":"sl",scores,na_items:Object.keys(na).filter(k=>na[k]),notes,visit_note:visitNote,total_score:tScore,max_score:aMax,pct:tPct,photo_count:photoCount};

    // If offline, queue it

        clearAutosave(user?.id);setView("done");
      }else{alert("Kunne ikke lagre lokalt. Sjekk lagringsplass.");}
      return;

    try{
      const{data,error}=await sb.from("visits").insert(v).select().single();

      if(photoCount>0){

          (arr||[]).forEach(p=>{if(p.path)photoRecords.push({visit_id:data.id,item_id:String(itemId),storage_path:p.path,public_url:p.url,uploaded_by:user.id});});

      // ── Auto-sync actions with scores ──

      const allItems=JOURNEY.flatMap(j=>j.items);
      if(includeHms)allItems.push(...HMS_DATA[curT()].items);

      // 1. Auto-close existing open actions where user scored Godkjent (full marks)
      const toClose=stationActions.filter(a=>{
        if(a.status!=='open'&&a.status!=='in_progress')return false;
        const itemId=String(a.item_id);
        const scoreNow=scores[itemId];
        const item=allItems.find(i=>String(i.id)===itemId);
        return item&&scoreNow===item.max;
      });
      for(const a of toClose){
        await sb.from("actions").update({status:'completed',completed_at:new Date().toISOString(),completed_by:user.id}).eq("id",a.id);
      }

      // 2. Auto-create or reopen actions for non-approved items
      const toCreate=[];
      const toReopen=[];
      for(const[itemIdStr,s]of Object.entries(scores)){
        const item=allItems.find(i=>String(i.id)===itemIdStr);
        if(!item)continue;
        if(na[itemIdStr])continue;
        if(s>=item.max)continue; // Godkjent — no action needed
        const newPriority=s===0?'high':'medium';
        const title=item.t.split(" — ")[0];

        // Find any existing action for this item on this station (open, in_progress, OR completed)
        const existing=stationActions.find(a=>String(a.item_id)===itemIdStr);
        if(existing){

        // Brand new tiltak

    return operPoints.filter(op=>{
      // Determine target stations for this point
      let targets=[];
      if(op.target_scope==='all')targets=scopedStationsForUser.map(s=>s.id);
      else if(op.target_scope==='region'&&op.target_region_ids)targets=scopedStationsForUser.filter(s=>op.target_region_ids.includes(s.region_id)).map(s=>s.id);
      else if(op.target_scope==='stations'&&op.target_station_ids)targets=op.target_station_ids.filter(id=>scopedStationIds.has(id));
      // Check if all targets have been acknowledged
      const unacked=targets.filter(sid=>!operAcks.find(a=>a.operative_id===op.id&&a.station_id===sid));
      return unacked.length>0;
    }).length;
  },[operPoints,operAcks,scopedStationsForUser,scopedStationIds]);

  const openActionCount=useMemo(()=>{
    return actions.filter(a=>scopedStationIds.has(a.station_id)&&(a.status==='open'||a.status==='in_progress')).length;
  },[actions,scopedStationIds]);

  const myUpcomingPlanned=useMemo(()=>{
    const today=new Date().toISOString().slice(0,10);
    return plannedVisits.filter(pv=>pv.planned_by===user?.id&&pv.planned_date>=today&&pv.status==='planned').length;
  },[plannedVisits,user]);

  const role=profile?.role;
  const isRS=role==="regionssjef";
  const isLeder=role==="leder";
  const isSL=role==="stasjonsleder";
  const cancelAudit=()=>{const hw=Object.keys(scores).length>0;if(hw&&!confirm("Avbryte? Alt arbeid går tapt."))return;setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setShowRef(false);setIncludeHms(null);clearAutosave(user?.id);setView("home");};

  const resumeDraft=()=>{
    if(!draft)return;
    setStation(draft.station);
    setScores(draft.scores||{});setNa(draft.na||{});setNotes(draft.notes||{});setPhotos(draft.photos||{});
    setVisitNote(draft.visitNote||"");setCatIdx(draft.catIdx||0);setIncludeHms(draft.includeHms);
    setDraft(null);setView("audit");
  };

  const discardDraft=()=>{
    if(confirm("Forkaste utkastet?")){clearAutosave(user?.id);setDraft(null);}
  };

  /* ── LOADING ── */
  if(loading)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:D}}>
    <img src={LW} alt="YX" style={{height:80,marginBottom:20}}/><div className="loader"/></div>);

  /* ── LOGIN ── */
  if(view==="login"||!user)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:`linear-gradient(170deg, ${D} 0%, #162d4a 100%)`,padding:32}}>
      <img src={LW} alt="YX" style={{height:72,marginBottom:16}}/>
      <div style={{color:R,fontSize:13,fontWeight:800,letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>Klar for Kunde</div>
      <div style={{color:"#5577aa",fontSize:12,marginBottom:48}}>Kundereisen — stasjonsbesøk</div>
      <div style={{width:"100%",maxWidth:340}}>
        <input type="email" placeholder="E-post" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} autoComplete="email"
          style={{width:"100%",padding:"15px 18px",borderRadius:12,background:"rgba(255,255,255,.08)",color:"#fff",border:"1px solid rgba(255,255,255,.15)",marginBottom:10,fontSize:16,backdropFilter:"blur(10px)"}}/>
        <input type="password" placeholder="Passord" value={loginPw} onChange={e=>setLoginPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} autoComplete="current-password"
          style={{width:"100%",padding:"15px 18px",borderRadius:12,background:"rgba(255,255,255,.08)",color:"#fff",border:"1px solid rgba(255,255,255,.15)",marginBottom:18,fontSize:16,backdropFilter:"blur(10px)"}}/>
        {loginErr&&<div style={{color:"#f87171",fontSize:13,marginBottom:10,textAlign:"center"}}>{loginErr}</div>}
        <button onClick={login} disabled={loginLoad} style={{width:"100%",padding:"16px",background:R,color:"#fff",borderRadius:12,fontWeight:800,fontSize:16,opacity:loginLoad?.6:1,letterSpacing:.5}}>{loginLoad?"Logger inn...":"Logg inn"}</button>
      </div>
    </div>
  );

  /* ── HOME ── */
  if(view==="home"){
    const regionStationIds=isRS&&profile?.region_id?new Set(stations.filter(s=>s.region_id===profile.region_id).map(s=>s.id)):null;
    const scopedVisits=regionStationIds?visits.filter(v=>regionStationIds.has(v.station_id)):visits;
    const myV=scopedVisits.filter(v=>isRS?v.visit_role==="rs":v.visit_role==="sl").slice(0,4);
    const hour=new Date().getHours();
    const greeting=hour<10?"God morgen":hour<17?"Hei":"God kveld";
    const firstName=profile?.name?.split(" ")[0]||"";

    // ── Denne måneden — handlingsdrivende KPIer ──
    const today=new Date().toISOString().slice(0,10);
    const in7Days=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
    const monthStart=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString();
    const thirtyDaysAgo=new Date(Date.now()-60*86400000).toISOString();

    // Ikke besøkt siste 60 dager
    const notVisitedRecently=scopedStationsForUser.filter(s=>{
      const lastVisit=visits.find(v=>v.station_id===s.id&&v.visit_role==="rs");
      return!lastVisit||lastVisit.created_at<thirtyDaysAgo;
    }).length;

    // Besøk denne måneden
    const visitsThisMonth=scopedVisits.filter(v=>v.visit_role==="rs"&&v.created_at>=monthStart).length;

    // Tiltak som forfaller denne uken
    const actionsDueSoon=actions.filter(a=>scopedStationIds.has(a.station_id)&&(a.status==='open'||a.status==='in_progress')).length;

    // Planlagte besøk denne uken
    const upcomingMine=plannedVisits.filter(pv=>pv.planned_by===user?.id&&pv.planned_date>=today&&pv.planned_date<=in7Days&&pv.status==='planned');

    // Snitt-score siste 30 dager
    const recentVisits=scopedVisits.filter(v=>v.created_at>=thirtyDaysAgo);
    const avgRecent=recentVisits.length?Math.round(recentVisits.reduce((s,v)=>s+v.pct,0)/recentVisits.length):null;

    return(
    <div style={{paddingBottom:100,background:C.surface,minHeight:"100vh"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:`1px solid ${C.line}`}}>
        <img src={LC} alt="YX" style={{height:20}}/>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {!online&&<span style={{fontSize:11,fontWeight:500,color:C.warn,display:"flex",alignItems:"center",gap:4}}><Icon name="signal" size={14}/> Offline</span>}
          {queueCount>0&&online&&<button onClick={syncQueue} style={{fontSize:11,fontWeight:500,color:C.red}}>{syncing?"Synker…":`${queueCount} i kø`}</button>}
          <button onClick={logout} style={{fontSize:13,color:C.body,fontWeight:500,padding:"6px 0"}}>Logg ut</button>
        </div>
      </div>

      {/* Greeting */}
      <div style={{padding:"32px 20px 8px"}}>
        <div style={{fontSize:28,fontWeight:600,color:C.ink,letterSpacing:-0.5,marginBottom:4}}>{greeting}, {firstName}</div>
        <div style={{fontSize:15,color:C.body}}>
          {isRS?(myRegion?`Region ${myRegion.name} · ${scopedStationsForUser.length} stasjoner`:"Regionssjef"):
           isLeder?"Leder · alle regioner":
           "Stasjonsleder"}
        </div>
      </div>

      {/* Draft banner */}
      {draft&&(
        <div style={{margin:"16px 20px 0",padding:"14px 16px",background:C.warnSoft,border:`1px solid ${C.warn}22`,borderRadius:12}}>
          <div style={{fontSize:13,fontWeight:600,color:C.ink,marginBottom:2}}>Ulagret besøk</div>
          <div style={{fontSize:13,color:C.body,marginBottom:12}}>{draft.stationName} · {Object.keys(draft.scores||{}).length} punkter · {new Date(draft.savedAt).toLocaleString("nb-NO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={resumeDraft} style={{flex:2,padding:"10px 14px",background:C.ink,color:"#fff",borderRadius:8,fontSize:14,fontWeight:500}}>Fortsett</button>
            <button onClick={discardDraft} style={{flex:1,padding:"10px 14px",background:"transparent",color:C.body,borderRadius:8,fontSize:14,fontWeight:500}}>Forkast</button>
          </div>
        </div>
      )}

      {/* Denne måneden — handlingsdrivende KPIer */}
      {(isRS||isLeder)&&(
        <div style={{padding:"28px 20px 0"}}>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Denne måneden</div>
          <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>

            {notVisitedRecently>0&&(
              <button onClick={()=>setView("visits")} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                <div style={{width:6,height:32,borderRadius:3,background:C.warn,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:500,color:C.ink}}>{notVisitedRecently} stasjoner ikke besøkt siste 60 dager</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>Trenger oppfølging</div>
                </div>
                <Icon name="chevronRight" size={16} color={C.muted}/>
              </button>
            )}

            {actionsDueSoon>0&&(
              <button onClick={()=>setView("actions")} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                <div style={{width:6,height:32,borderRadius:3,background:C.bad,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:500,color:C.ink}}>{actionsDueSoon} åpne tiltak</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>Venter på lukking</div>
                </div>
                <Icon name="chevronRight" size={16} color={C.muted}/>
              </button>
            )}

            {pendingOperCount>0&&(
              <button onClick={()=>setView("hms")} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                <div style={{width:6,height:32,borderRadius:3,background:C.red,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:500,color:C.ink}}>{pendingOperCount} operative krav venter</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>Må kvitteres ut av stasjoner</div>
                </div>
                <Icon name="chevronRight" size={16} color={C.muted}/>
              </button>
            )}

            {notVisitedRecently===0&&actionsDueSoon===0&&pendingOperCount===0&&(
              <div style={{background:C.surface,padding:"20px 16px",color:C.muted,fontSize:14,textAlign:"center"}}>Ingenting som krever handling</div>
            )}
          </div>

          {/* Number summary */}
          <div style={{display:"flex",gap:24,marginTop:24}}>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Besøk i måneden</div>
              <div style={{fontSize:24,fontWeight:600,color:C.ink,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{visitsThisMonth}</div>
            </div>
            {avgRecent!==null&&(
              <div>
                <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Snitt siste 30d</div>
                <div style={{fontSize:24,fontWeight:600,color:C.ink,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{avgRecent}%</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Planlagte besøk */}
      {upcomingMine.length>0&&(
        <div style={{padding:"28px 20px 0"}}>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Planlagte besøk</div>
            <button onClick={()=>setView("visits")} style={{fontSize:13,color:C.body,fontWeight:500}}>Se alle</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
            {upcomingMine.slice(0,3).map(pv=>{
              const st=stations.find(s=>s.id===pv.station_id);
              if(!st)return null;
              const days=Math.ceil((new Date(pv.planned_date)-new Date(today))/86400000);
              const dayLabel=days===0?"I dag":days===1?"I morgen":`Om ${days} dager`;
              return(
                <button key={pv.id} onClick={()=>{setStationView(st);setView("stationDetail");}} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:2}}>{dayLabel} · {new Date(pv.planned_date).toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"short"})}</div>
                  </div>
                  <Icon name="chevronRight" size={16} color={C.muted}/>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Nylig besøkt */}
      {myV.length>0&&(
        <div style={{padding:"28px 20px 0"}}>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Nylig besøkt</div>
          <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
            {myV.slice(0,3).map(v=>{
              const sn=stations.find(s=>s.id===v.station_id);
              if(!sn)return null;
              return(
                <button key={v.id} onClick={()=>{setStationView(sn);setView("stationDetail");}} style={{background:C.surface,padding:"14px 16px",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sn.name}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:2}}>{new Date(v.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})} · {v.pct}%</div>
                  </div>
                  <Icon name="chevronRight" size={18} color={C.muted}/>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{padding:"40px 20px 20px",textAlign:"center",color:C.faint,fontSize:11}}>
        v27 · {online?"Online":"Offline"}
      </div>

      <BottomNav view={view} setView={setView} hmsCount={pendingOperCount} actionCount={openActionCount} plannedCount={myUpcomingPlanned}/>
    </div>
  );}

  /* ── BESØK — stasjonsliste + planlagte ── */
  if(view==="visits"){
    const today=new Date().toISOString().slice(0,10);
    const myPlanned=plannedVisits.filter(pv=>pv.planned_by===user?.id&&pv.status==='planned').sort((a,b)=>a.planned_date.localeCompare(b.planned_date));

    return(
    <div style={{paddingBottom:100,background:C.surface,minHeight:"100vh"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:`1px solid ${C.line}`}}>
        <img src={LC} alt="YX" style={{height:20}}/>
        <button onClick={logout} style={{fontSize:13,color:C.body,fontWeight:500,padding:"6px 0"}}>Logg ut</button>
      </div>

      <div style={{padding:"28px 20px 16px"}}>
        <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Besøk</div>
        <div style={{fontSize:24,fontWeight:600,color:C.ink,letterSpacing:-0.3}}>Stasjoner og plan</div>
      </div>

      {/* Planlagte besøk seksjon */}
      {myPlanned.length>0&&(
        <div style={{padding:"0 20px 24px"}}>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Planlagte besøk</div>
          <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
            {myPlanned.map(pv=>{
              const st=stations.find(s=>s.id===pv.station_id);
              if(!st)return null;
              const days=Math.ceil((new Date(pv.planned_date)-new Date(today))/86400000);
              const overdue=days<0;
              const dayLabel=days<0?`${Math.abs(days)} dager forsinket`:days===0?"I dag":days===1?"I morgen":`Om ${days} dager`;
              return(
                <div key={pv.id} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:6,height:32,borderRadius:3,background:overdue?C.bad:days<=2?C.warn:C.ok,flexShrink:0}}/>
                  <button onClick={()=>{setStationView(st);setView("stationDetail");}} style={{flex:1,minWidth:0,textAlign:"left"}}>
                    <div style={{fontSize:15,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name}</div>
                    <div style={{fontSize:12,color:overdue?C.bad:C.muted,marginTop:2}}>{dayLabel} · {new Date(pv.planned_date).toLocaleDateString("nb-NO",{weekday:"short",day:"numeric",month:"short"})}</div>
                    {pv.note&&<div style={{fontSize:12,color:C.body,marginTop:4,fontStyle:"italic"}}>{pv.note}</div>}
                  </button>
                  <button onClick={()=>cancelPlanned(pv.id)} aria-label="Fjern" style={{color:C.muted,padding:8}}><Icon name="x" size={16}/></button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Stasjonsliste */}
      <div style={{padding:"0 20px 14px"}}>
        <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>{(isRS||isLeder)?"Stasjoner":"Stasjon"}</div>
        <div style={{position:"relative",marginBottom:10}}>
          <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:C.muted}}><Icon name="search" size={16}/></div>
          <input type="text" placeholder="Søk stasjon eller sted" value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:"100%",padding:"11px 38px 11px 40px",borderRadius:10,background:C.subtle,border:`1px solid transparent`,fontSize:15,color:C.ink}}/>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",padding:6,color:C.muted}}><Icon name="x" size={16}/></button>}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:12}}>{filt.length} {search?"treff":"stasjoner"}{loc&&!search?" · sortert etter avstand":""}</div>
      </div>

      {stLoad?<div style={{textAlign:"center",padding:40}}><div className="loader" style={{margin:"0 auto"}}/></div>:(
        <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden",margin:"0 20px"}}>
          {filt.slice(0,showAll?filt.length:20).map(s=>{
            const lv=visits.find(v=>v.station_id===s.id);
            const d=loc&&s.lat?dist(s):null;
            const distTxt=d?(d<1?`${Math.round(d*1000)} m`:`${d.toFixed(1)} km`):null;
            const isPlanned=plannedVisits.find(pv=>pv.station_id===s.id&&pv.planned_by===user?.id&&pv.status==='planned');
            return(
              <button key={s.id} onClick={()=>{if(isRS||isLeder){setStationView(s);setView("stationDetail");}else{setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setIncludeHms(null);setStation(s);setView("audit");}setShowAll(false);}}
                style={{background:C.surface,padding:"14px 16px",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
                    {s.name}
                    {isPlanned&&<Icon name="clock" size={12} color={C.muted}/>}
                  </div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>
                    <span>{s.poststed}</span>
                    {s.type==="automat"&&<span> · Automat</span>}
                    {distTxt&&<span> · {distTxt}</span>}
                  </div>
                </div>
                {lv&&<span style={{fontSize:13,fontWeight:500,color:C.body,fontVariantNumeric:"tabular-nums"}}>{lv.pct}%</span>}
                <Icon name="chevronRight" size={16} color={C.muted}/>
              </button>
            );
          })}
          {!showAll&&filt.length>20&&(
            <button onClick={()=>setShowAll(true)} style={{background:C.surface,padding:"14px 16px",textAlign:"center",color:C.body,fontSize:14,fontWeight:500}}>
              Se alle {filt.length} stasjoner
            </button>
          )}
        </div>
      )}

      <BottomNav view={view} setView={setView} hmsCount={pendingOperCount} actionCount={openActionCount} plannedCount={myUpcomingPlanned}/>
    </div>
  );}

  /* ── AUDIT ── */
  if(view==="audit"&&station){
    const cat=journeySteps[catIdx];
    const ci=cat.items.filter(i=>!isNA(i.id));
    const cMax=ci.reduce((s,i)=>s+i.max,0);
    const cScore=ci.reduce((s,i)=>s+(G(i.id)||0),0);
    const isLast=catIdx===journeySteps.length-1;
    const se=isRS?getSE(station.id):null;

    // FIX: items that need evidence (scored non-max, not N/A, no photo and no comment)
    const needsEvidence=cat.items.filter(i=>{
      if(isNA(i.id))return false;
      const v=G(i.id);
      if(v===null||v>=i.max)return false; // not scored or godkjent
      const hasNote=GN(i.id).trim().length>0;
      const hasPhoto=(photos[i.id]||[]).length>0;
      return!hasNote&&!hasPhoto;
    });
    const canAdvance=needsEvidence.length===0;

    const scrollToFirstUnfinished=()=>{
      if(needsEvidence.length===0)return true;
      const first=needsEvidence[0];
      const el=document.getElementById('item-'+first.id);
      if(el){el.scrollIntoView({behavior:'smooth',block:'center'});}
      return false;
    };

    return(
      <div style={{paddingBottom:140,background:C.bg,minHeight:"100vh"}}>
        {/* Minimal top bar */}
        <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
          <button onClick={cancelAudit} style={{color:C.body,fontSize:15,fontWeight:500,display:"flex",alignItems:"center",gap:6,padding:"6px 0",minHeight:36}}>
            <Icon name="arrowLeft" size={18}/> Avbryt
          </button>
          <div style={{fontSize:13,color:C.muted}}>{station?.name}</div>
        </div>

        {/* Simple step header — progress bar + name, no hero image */}
        <div style={{padding:"20px 20px 16px",background:C.surface,borderBottom:`1px solid ${C.line}`}}>
          <div style={{display:"flex",gap:4,marginBottom:14}}>
            {journeySteps.map((j,i)=>(
              <div key={j.id} style={{flex:1,height:3,borderRadius:2,background:i<=catIdx?C.ink:C.line,transition:"background .2s"}}/>
            ))}
          </div>
          <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Steg {cat.step} av {journeySteps.length}</div>
          <div style={{fontSize:22,fontWeight:600,color:C.ink,letterSpacing:-0.3}}>{cat.name}</div>
          <div style={{fontSize:13,color:C.body,marginTop:4,lineHeight:1.5}}>{cat.desc}</div>
        </div>

        {/* Reference — subtle collapsed by default */}
        {cat.img&&(
          <>
            <button onClick={()=>setShowRef(!showRef)} style={{width:"100%",padding:"12px 20px",background:C.surface,borderBottom:`1px solid ${C.line}`,display:"flex",alignItems:"center",justifyContent:"space-between",color:C.body,fontSize:13}}>
              <span style={{fontWeight:500}}>Referansebilde fra kundereisen</span>
              <Icon name="chevronDown" size={16} color={C.muted}/>
            </button>
            {showRef&&<div style={{padding:16,background:C.subtle,borderBottom:`1px solid ${C.line}`}}><img src={cat.img} style={{width:"100%",borderRadius:8}} alt="Referanse"/></div>}
          </>
        )}

        {/* Checklist items */}
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
          {cat.items.map((item,idx)=>{
            const val=G(item.id);
            const ina=isNA(item.id);
            const opts=sOpts(item.max);
            const seVal=getSES(se,item.id);
            const seIsNa=se?.na_items?.includes(String(item.id));
            const seL=seVal!=null&&!seIsNa?lFor(item.max,seVal):null;
            const myL=val!=null&&!ina?lFor(item.max,val):null;
            const gap=isRS&&seL&&myL&&seL.c!==myL.c;
            const hasScore=val!=null&&!ina;

            return(
              <div key={item.id} id={`item-${item.id}`} style={{background:C.surface,border:`1px solid ${hasScore?C.lineStrong:C.line}`,borderRadius:12,padding:"18px",opacity:ina?.5:1,scrollMarginTop:"100px",transition:"border-color .2s"}}>
                {/* Item text */}
                <div style={{fontSize:16,color:C.ink,lineHeight:1.45,marginBottom:14,fontWeight:500}}>
                  {item.t.includes(" — ")?
                    <><span style={{fontWeight:600}}>{item.t.split(" — ")[0]}</span><span style={{fontWeight:400,color:C.body}}> — {item.t.split(" — ").slice(1).join(" — ")}</span></>:
                    item.t}
                </div>

                {/* Self-eval hint for RS — inline text, not a badge */}
                {isRS&&seL&&!ina&&(
                  <div style={{fontSize:13,color:C.muted,marginBottom:12}}>
                    Stasjonen vurderte: <span style={{color:seL.c,fontWeight:500}}>{seL.l}</span>
                  </div>
                )}

                {/* Score buttons */}
                {!ina&&(
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    {opts.map(o=>{
                      const selected=val===o.v;
                      return(
                        <button key={o.v+o.l} onClick={()=>{
                          S(item.id,o.v);
                          if(o.v===item.max){
                            const nextIdx=cat.items.findIndex(i=>i.id===item.id)+1;
                            if(nextIdx<cat.items.length){
                              setTimeout(()=>{
                                const nextEl=document.getElementById('item-'+cat.items[nextIdx].id);
                                if(nextEl)nextEl.scrollIntoView({behavior:'smooth',block:'start'});
                              },250);
                            }
                          }
                        }}
                          style={{
                            flex:1,padding:"13px 8px",borderRadius:10,minHeight:52,
                            background:selected?o.c:C.subtle,
                            color:selected?"#fff":C.body,
                            fontSize:13,fontWeight:selected?600:500,
                            border:"none",transition:"all .15s"
                          }}>{o.l}</button>
                      );
                    })}
                  </div>
                )}

                {/* Gap warning — inline, restrained */}
                {gap&&!ina&&(
                  <div style={{fontSize:13,color:C.bad,marginBottom:10,display:"flex",alignItems:"flex-start",gap:6}}>
                    <Icon name="alert" size={14} color={C.bad}/>
                    <span>Avvik: stasjonen sa «{seL.l}», du sier «{myL.l}»</span>
                  </div>
                )}

                {/* Coaching question — subtle, left-aligned with line */}
                {isRS&&!ina&&(
                  <div style={{borderLeft:`2px solid ${C.line}`,paddingLeft:12,margin:"12px 0",fontSize:14,color:C.body,fontStyle:"italic",lineHeight:1.5}}>
                    {item.q}
                  </div>
                )}

                {/* Campaign info — only when relevant, minimal */}
                {!ina&&[5,14,17].includes(item.id)&&campaigns.length>0&&(()=>{
                  const c=campaigns[0];
                  let items=[];try{items=typeof c.items==='string'?JSON.parse(c.items):(c.items||[]);}catch(e){}
                  const relevant=item.id===5?items:item.id===14?items.filter(i=>['A','B','Drikke','Kiosk','Is','COOP'].includes(i.type)):items.filter(i=>['Drikke','Kiosk','Is','Tilbehør'].includes(i.type));
                  if(relevant.length===0)return null;
                  return(
                    <div style={{background:C.subtle,borderRadius:8,padding:"10px 12px",margin:"10px 0",fontSize:12}}>
                      <div style={{fontWeight:500,color:C.body,marginBottom:6}}>{c.period} · Aktuelle kampanjer</div>
                      <div style={{color:C.muted,lineHeight:1.5}}>
                        {relevant.slice(0,4).map(ci=>ci.name).join(" · ")}
                        {relevant.length>4&&` +${relevant.length-4}`}
                      </div>
                    </div>
                  );
                })()}

                {/* Note + voice */}
                {!ina&&(
                  <div style={{display:"flex",alignItems:"flex-start",gap:8,marginTop:12}}>
                    <textarea placeholder="Notat (valgfritt)" value={GN(item.id)} onChange={e=>SN(item.id,e.target.value)}
                      style={{flex:1,minHeight:44,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px",fontSize:15,color:C.ink,background:C.subtle,lineHeight:1.4}}/>
                    <Voice onText={t=>SN(item.id,(GN(item.id)?GN(item.id)+" ":"")+t)}/>
                  </div>
                )}

                {/* Photos */}
                {!ina&&<Cam userId={user.id} photos={photos[item.id]||[]} onAdd={d=>setPhotos(p=>({...p,[item.id]:[...(p[item.id]||[]),d]}))} onRemove={idx=>setPhotos(p=>({...p,[item.id]:(p[item.id]||[]).filter((_,i)=>i!==idx)}))}/>}

                {/* Evidence hint */}
                {!ina&&val!==null&&val<item.max&&!GN(item.id).trim()&&!(photos[item.id]||[]).length&&(
                  <div style={{marginTop:10,fontSize:13,color:C.warn,display:"flex",alignItems:"center",gap:6}}>
                    <Icon name="camera" size={14} color={C.warn}/>
                    <span>Legg til bilde eller notat</span>
                  </div>
                )}

                {/* N/A toggle at bottom */}
                <button onClick={()=>NA(item.id,!ina)} style={{fontSize:12,color:C.muted,fontWeight:500,padding:"8px 0 0",marginTop:8}}>{ina?"Gjør aktuell":"Marker som ikke aktuell"}</button>
              </div>
            );
          })}

          {/* Summary on last step */}
          {isLast&&(
            <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:12,padding:18,marginTop:4}}>
              <div style={{fontSize:15,fontWeight:600,color:C.ink,marginBottom:4}}>Oppsummering</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:12}}>Avtaler, observasjoner, neste steg</div>
              <div style={{display:"flex",gap:8}}>
                <textarea placeholder="Skriv oppsummering…" value={visitNote} onChange={e=>setVisitNote(e.target.value)}
                  style={{flex:1,minHeight:100,border:`1px solid ${C.line}`,borderRadius:8,padding:"12px",fontSize:15,color:C.ink,background:C.subtle,lineHeight:1.5}}/>
                <Voice onText={t=>setVisitNote(v=>(v?v+" ":"")+t)}/>
              </div>
            </div>
          )}
        </div>

        {/* Bottom action bar */}
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.line}`,padding:"12px 20px max(16px, env(safe-area-inset-bottom))",maxWidth:720,margin:"0 auto"}}>
          {needsEvidence.length>0&&(
            <div style={{fontSize:12,color:C.warn,textAlign:"center",marginBottom:8,fontWeight:500}}>
              {needsEvidence.length} punkt{needsEvidence.length>1?"er":""} trenger bilde eller notat
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,fontSize:12,color:C.muted}}>
            <span>Steg {cat.step} av {journeySteps.length}</span>
            <span style={{color:C.ink,fontWeight:500}}>{tPct}% totalt</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            {catIdx>0&&<button onClick={()=>{setCatIdx(i=>i-1);setShowRef(false);window.scrollTo(0,0);}} style={{padding:"13px 16px",background:C.subtle,borderRadius:10,fontWeight:500,color:C.body,fontSize:15,minWidth:56}}>
              <Icon name="arrowLeft" size={18}/>
            </button>}
            {!isLast?
              <button onClick={()=>{if(!scrollToFirstUnfinished())return;setCatIdx(i=>i+1);setShowRef(false);window.scrollTo(0,0);}} style={{flex:1,padding:"13px",background:canAdvance?C.ink:C.lineStrong,color:"#fff",borderRadius:10,fontWeight:500,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                Neste steg <Icon name="arrowRight" size={16}/>
              </button>
              :
              <button onClick={()=>{if(!scrollToFirstUnfinished())return;submit();}} disabled={saving} style={{flex:1,padding:"13px",background:canAdvance?C.red:C.lineStrong,color:"#fff",borderRadius:10,fontWeight:500,fontSize:15,opacity:saving?.6:1}}>
                {saving?"Lagrer…":"Fullfør besøk"}
              </button>}
          </div>
        </div>
      </div>
    );
  }

  /* ── DONE — with AI summary ── */
  if(view==="done"&&lastVisit){
    const v=lastVisit;const se=isRS?getSE(v.station_id):null;

    // Generate visit summary from data
    const summary=(()=>{
      const lines=[];
      const scores=v.scores||{};
      const naItems=v.na_items||[];

      // Area breakdown
      const areas=JOURNEY.map(j=>{
        let tot=0,max=0;
        j.items.forEach(item=>{const s=scores[String(item.id)];if(s!==undefined&&!naItems.includes(String(item.id))){tot+=s;max+=item.max;}});
        const pct=max>0?Math.round(tot/max*100):null;
        return{name:j.name,icon:j.icon,pct};
      }).filter(a=>a.pct!==null);

      const best=areas.reduce((a,b)=>a.pct>b.pct?a:b);
      const worst=areas.reduce((a,b)=>a.pct<b.pct?a:b);

      lines.push(`${v.stationName}: ${v.pct}% totalt.`);

      if(best.pct!==worst.pct){
        lines.push(`Sterkest på ${best.icon} ${best.name} (${best.pct}%). Svakest på ${worst.icon} ${worst.name} (${worst.pct}%).`);
      }

      // Failed items
      const fails=Object.entries(scores).filter(([k,s])=>s===0&&!naItems.includes(k)).map(([k])=>{
        const item=JOURNEY.flatMap(j=>j.items).find(i=>String(i.id)===k);
        return item?item.t.split(" — ")[0]:null;
      }).filter(Boolean);

      if(fails.length>0)lines.push(`Ikke godkjent: ${fails.join(", ")}.`);

      // Partial items
      const partials=Object.entries(scores).filter(([k,s])=>s>0&&s<5&&!naItems.includes(k)).length;
      if(partials>0)lines.push(`${partials} punkt${partials>1?"er":""} vurdert som «Delvis».`);

      // Gap with SL
      if(se){
        const gap=se.pct-v.pct;
        if(gap>10)lines.push(`Stasjonens selvevaluering lå ${gap}pp over din score — de overvurderer seg på flere punkter.`);
        else if(gap<-10)lines.push(`Du scoret ${Math.abs(gap)}pp høyere enn stasjonen selv — de er strengere mot seg selv.`);
        else lines.push(`Gap mot selvevaluering: ${Math.abs(gap)}pp — godt kalibrert.`);
      }

      // Notes summary
      const noteCount=Object.values(v.notes||{}).filter(n=>n&&n.trim()).length;
      if(noteCount>0)lines.push(`${noteCount} notat${noteCount>1?"er":""} registrert.`);
      if(v.photo_count>0)lines.push(`${v.photo_count} foto lagret.`);

      // Recommendation
      if(worst.pct<50)lines.push(`Anbefaling: Prioriter ${worst.name.toLowerCase()} ved neste besøk.`);
      else if(v.pct>=80)lines.push(`Stasjonen holder god standard. Anerkjenn innsatsen.`);

      return lines;
    })();

    return(
      <div style={{minHeight:"100vh",background:C.surface,display:"flex",flexDirection:"column",alignItems:"center",padding:"48px 20px 32px"}}>
        {/* Check icon */}
        <div style={{width:56,height:56,borderRadius:28,background:C.okSoft,color:C.ok,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:20}}>
          <Icon name="check" size={28} stroke={2.5} color={C.ok}/>
        </div>

        {/* Completion message */}
        <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>
          {isRS?"Besøk registrert":"Selvevaluering lagret"}
        </div>
        <div style={{fontSize:22,fontWeight:600,color:C.ink,letterSpacing:-0.3,marginBottom:24,textAlign:"center"}}>
          {v.stationName}
        </div>

        {/* Score — big but clean */}
        <div style={{fontSize:64,fontWeight:600,color:C.ink,lineHeight:1,fontVariantNumeric:"tabular-nums",letterSpacing:-2}}>{v.pct}%</div>
        <div style={{fontSize:14,color:C.body,marginTop:6}}>{pLbl(v.pct)}</div>

        {/* Area bars — minimal */}
        <div style={{width:"100%",maxWidth:360,marginTop:32}}>
          {JOURNEY.map(j=>{
            let tot=0,max=0;
            j.items.forEach(item=>{const s=v.scores?.[String(item.id)];if(s!==undefined&&!v.na_items?.includes(String(item.id))){tot+=s;max+=item.max;}});
            const pct=max>0?Math.round(tot/max*100):0;
            return(
              <div key={j.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <div style={{flex:1,fontSize:13,color:C.body}}>{j.name}</div>
                <div style={{width:120,height:4,background:C.line,borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",background:C.ink,width:pct+"%",borderRadius:2,transition:"width .5s"}}/>
                </div>
                <div style={{fontSize:13,fontWeight:500,color:C.ink,width:40,textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{pct}%</div>
              </div>
            );
          })}
        </div>

        {/* Gap info */}
        {se&&isRS&&(
          <div style={{marginTop:20,fontSize:13,color:C.muted}}>
            Stasjonens selvevaluering: <span style={{color:C.ink,fontWeight:500}}>{se.pct}%</span> · Avvik <span style={{color:C.ink,fontWeight:500}}>{Math.abs(v.pct-se.pct)}pp</span>
          </div>
        )}

        {/* Summary — only if meaningful insights */}
        {summary.length>2&&(
          <div style={{width:"100%",maxWidth:480,marginTop:32,padding:"20px 0",borderTop:`1px solid ${C.line}`}}>
            <div style={{fontSize:13,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Oppsummering</div>
            {summary.slice(1).map((line,i)=>(
              <div key={i} style={{fontSize:14,color:C.body,lineHeight:1.6,marginBottom:6}}>{line}</div>
            ))}
          </div>
        )}

        {/* Auto-actions */}
        {v.autoActions&&(v.autoActions.closed>0||v.autoActions.created>0||v.autoActions.reopened>0)&&(
          <div style={{width:"100%",maxWidth:480,marginTop:20,padding:"16px 0",borderTop:`1px solid ${C.line}`}}>
            <div style={{fontSize:13,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Tiltak</div>
            {v.autoActions.created>0&&<div style={{fontSize:14,color:C.body,marginBottom:4}}>{v.autoActions.created} nye tiltak opprettet</div>}
            {v.autoActions.reopened>0&&<div style={{fontSize:14,color:C.body,marginBottom:4}}>{v.autoActions.reopened} tidligere lukkede tiltak åpnet igjen</div>}
            {v.autoActions.closed>0&&<div style={{fontSize:14,color:C.body,marginBottom:4}}>{v.autoActions.closed} tiltak lukket automatisk</div>}
          </div>
        )}

        {/* Actions */}
        <div style={{display:"flex",gap:8,marginTop:40,width:"100%",maxWidth:360}}>
          <button onClick={()=>generateReport(v,v.stationName)} style={{flex:1,padding:"13px",background:C.subtle,color:C.body,borderRadius:10,fontWeight:500,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Icon name="download" size={16}/> PDF
          </button>
          <button onClick={()=>{setStationView(null);setStation(null);setView("home");}} style={{flex:2,padding:"13px",background:C.ink,color:"#fff",borderRadius:10,fontWeight:500,fontSize:15}}>Ferdig</button>
        </div>
      </div>
    );
  }

  /* ── STATION DETAIL ── */
  if(view==="stationDetail"&&stationView){
    const sv=stationView;
    const stVisits=visits.filter(v=>v.station_id===sv.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const lastRS=stVisits.find(v=>v.visit_role==="rs");
    const lastSL=stVisits.find(v=>v.visit_role==="sl");
    const slVisits=stVisits.filter(v=>v.visit_role==="sl");
    // Unresolved: items scored <max on last SL visit
    const ref=lastSL||lastRS;
    const unresolved=ref?Object.entries(ref.scores||{}).filter(([k,v])=>v<5&&!ref.na_items?.includes(k)).map(([k,v])=>{
      const item=JOURNEY.flatMap(j=>j.items).find(i=>String(i.id)===k);
      return item?{...item,score:v,note:ref.notes?.[k]||""}:null;
    }).filter(Boolean):[];

    // ── AI COACHING ANALYSIS ──
    const coaching=(()=>{
      if(!lastSL)return null;
      const tips=[];

      // 1. Find consistently low areas
      const areaScores=JOURNEY.map(j=>{
        let tot=0,max=0;
        j.items.forEach(item=>{const s=lastSL.scores?.[String(item.id)];if(s!==undefined){tot+=s;max+=item.max;}});
        return{name:j.name,icon:j.icon,pct:max>0?Math.round(tot/max*100):0};
      }).sort((a,b)=>a.pct-b.pct);
      const weakest=areaScores[0];
      if(weakest.pct<60)tips.push({type:"area",icon:"🔴",text:`${weakest.icon} ${weakest.name} scorer ${weakest.pct}% — dette bør være hovedfokus på besøket. Start samtalen her.`});
      else if(weakest.pct<75)tips.push({type:"area",icon:"🟡",text:`${weakest.icon} ${weakest.name} er svakeste området (${weakest.pct}%). Rom for forbedring — ta det opp som coaching-tema.`});

      // 2. Gap analysis
      if(lastSL&&lastRS){
        const gap=lastSL.pct-lastRS.pct;
        if(gap>15)tips.push({type:"gap",icon:"⚠️",text:`Stasjonsleder vurderer seg ${gap}pp høyere enn regionssjef. Stor blind spot — vær konkret og vis med eksempler.`});
        else if(gap>5)tips.push({type:"gap",icon:"💬",text:`Moderat gap (${gap}pp) mellom stasjonens og din vurdering. Bruk spørsmål som «hva ser du selv når du går forplassen?» for å bygge bevissthet.`});
        else if(Math.abs(gap)<=5)tips.push({type:"gap",icon:"✅",text:`Dere er godt kalibrert (gap: ${Math.abs(gap)}pp). Fokuser på å løfte de svakeste enkeltpunktene.`});

        // Per-question blind spots: SL scored godkjent but RS scored lower
        const blindSpots=JOURNEY.flatMap(j=>j.items.map(item=>{
          const slS=lastSL.scores?.[String(item.id)];
          const rsS=lastRS.scores?.[String(item.id)];
          if(slS===undefined||rsS===undefined)return null;
          if(slS===item.max&&rsS<item.max)return{...item,slScore:slS,rsScore:rsS,area:j.name};
          return null;
        })).filter(Boolean);
        if(blindSpots.length>0){
          const names=blindSpots.slice(0,3).map(q=>`«${q.t.split(" — ")[0]}» (SL: ${q.slScore}/5, RS: ${q.rsScore}/5)`);
          tips.push({type:"blindspot",icon:"🔍",text:`Blind spots — stasjonsleder scorer høyt, du scorer lavt:\n${names.join(". ")}${blindSpots.length>3?`. +${blindSpots.length-3} til.`:""}`});
        }

        // Shared problems: both scored below full
        const sharedLow=JOURNEY.flatMap(j=>j.items.map(item=>{
          const slS=lastSL.scores?.[String(item.id)];
          const rsS=lastRS.scores?.[String(item.id)];
          if(slS===undefined||rsS===undefined)return null;
          // Both scored less than max (Ikke godkjent or Delvis)
          if(slS<item.max&&rsS<item.max)return{...item,area:j.name};
          return null;
        })).filter(Boolean);
        if(sharedLow.length>0){
          tips.push({type:"shared",icon:"🤝",text:`Enige om utfordringer: ${sharedLow.slice(0,3).map(q=>q.t.split(" — ")[0]).join(", ")}. Begge ser problemet — bruk det som utgangspunkt for tiltak.`});
        }
      }

      // 3. Find worst individual questions
      const worstQ=JOURNEY.flatMap(j=>j.items.map(item=>{
        const s=lastSL.scores?.[String(item.id)];
        return s!==undefined?{...item,score:s,area:j.name}:null;
      })).filter(Boolean).sort((a,b)=>a.score-b.score);
      const fails=worstQ.filter(q=>q.score===0);
      if(fails.length>0){
        const names=fails.slice(0,3).map(q=>q.t.split(" — ")[0]);
        tips.push({type:"fails",icon:"📸",text:`${fails.length} punkt${fails.length>1?"er":""} fikk «Ikke godkjent»: ${names.join(", ")}${fails.length>3?` (+${fails.length-3} til)`:""}`});
      }

      // 4. Trend analysis if multiple visits
      if(slVisits.length>=2){
        const prev=slVisits[1];
        const diff=lastSL.pct-prev.pct;
        if(diff<-10)tips.push({type:"trend",icon:"📉",text:`Scoren har falt ${Math.abs(diff)}pp siden forrige besøk. Finn ut hva som har endret seg — ny ansatt? Endret rutine?`});
        else if(diff>10)tips.push({type:"trend",icon:"📈",text:`Sterk fremgang! +${diff}pp siden sist. Anerkjenn det som er blitt bedre — det forsterker atferden.`});
      }

      // 5. Suggested approach
      if(weakest.pct<60)tips.push({type:"approach",icon:"🎯",text:`Foreslått tilnærming: Start med å spørre stasjonsleder hva de selv tenker om ${weakest.name.toLowerCase()} før du deler din vurdering. La dem eie problemet.`});
      else tips.push({type:"approach",icon:"🎯",text:`Foreslått tilnærming: Anerkjenn det som fungerer bra, deretter fokuser samtalen på de 2-3 punktene med størst forbedringspotensial.`});

      return tips.length>0?tips:null;
    })();

    return(
      <div style={{paddingBottom:100,background:C.bg,minHeight:"100vh"}}>
        <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
          <button onClick={()=>{setStationView(null);setView("home");}} style={{color:C.body,fontSize:15,fontWeight:500,display:"flex",alignItems:"center",gap:6,padding:"6px 0",minHeight:36}}>
            <Icon name="arrowLeft" size={18}/> Tilbake
          </button>
          <button onClick={logout} style={{fontSize:13,color:C.body,fontWeight:500,padding:"6px 0"}}>Logg ut</button>
        </div>

        {/* Station header */}
        <div style={{background:C.surface,padding:"24px 20px 20px",borderBottom:`1px solid ${C.line}`}}>
          <div style={{fontSize:22,fontWeight:600,color:C.ink,letterSpacing:-0.3,marginBottom:4}}>{sv.name}</div>
          <div style={{fontSize:14,color:C.body}}>{sv.address}, {sv.postnr} {sv.poststed}</div>
          <div style={{fontSize:13,color:C.muted,marginTop:2}}>{sv.type==="automat"?"Automat":"Fullservice"}{sv.forhandler?` · ${sv.forhandler}`:""}</div>

          <div style={{display:"flex",gap:32,marginTop:20,paddingTop:20,borderTop:`1px solid ${C.line}`}}>

            </div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Regionssjef</div>

            </div>
            {lastRS&&lastSL&&(
              <div>
                <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Avvik</div>
                <div style={{fontSize:28,fontWeight:600,color:Math.abs(lastSL.pct-lastRS.pct)>15?C.bad:Math.abs(lastSL.pct-lastRS.pct)>5?C.warn:C.ok,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{Math.abs(lastSL.pct-lastRS.pct)}pp</div>
              </div>
            )}
          </div>

          <div style={{display:"flex",gap:8,marginTop:20}}>
            <button onClick={()=>{setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setIncludeHms(null);setStation(sv);setView("audit");}} style={{flex:2,background:C.red,color:"#fff",padding:"12px 16px",borderRadius:10,fontSize:15,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Icon name="plus" size={16}/> Nytt besøk
            </button>
            {(isRS||isLeder)&&<button onClick={()=>{setPlanDate(new Date(Date.now()+86400000).toISOString().slice(0,10));setPlanNote("");setShowPlanModal({station:sv});}} style={{flex:1,background:C.subtle,color:C.body,padding:"12px 16px",borderRadius:10,fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Icon name="clock" size={14}/> Planlegg
            </button>}
          </div>
        </div>

        <div style={{padding:"24px 20px"}}>
          {/* Coaching briefing — calm, focused, single card */}
          {coaching&&(isRS||isLeder)&&(
            <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:12,padding:"18px",marginBottom:24}}>
              <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:4}}>
                <div style={{fontSize:15,fontWeight:600,color:C.ink}}>Coaching-briefing</div>
                <div style={{fontSize:11,color:C.muted}}>Automatisk analyse</div>
              </div>
              <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.5}}>
                {lastRS&&lastSL?"Basert på stasjonens selvevaluering og siste besøk.":lastSL?`Basert på stasjonens selvevaluering (${new Date(lastSL.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}).`:"Ingen data ennå."}
              </div>
              {coaching.map((tip,i)=>(
                <div key={i} style={{fontSize:14,color:C.body,lineHeight:1.6,padding:"10px 0",borderTop:i?`1px solid ${C.line}`:"none"}}>
                  {tip.text.replace(/[🔴🟡⚠️💬✅🔍🤝📸📉📈🎯]/g,'').trim()}
                </div>
              ))}
            </div>
          )}

          {/* Tiltak — clean list with subtle tabs */}
          {(()=>{
            const stationActions=actions.filter(a=>a.station_id===sv.id);
            const openA=stationActions.filter(a=>a.status==='open');
            const inProgA=stationActions.filter(a=>a.status==='in_progress');
            const doneA=stationActions.filter(a=>a.status==='completed');
            const shown=actionTab==='open'?openA:actionTab==='in_progress'?inProgA:doneA;
            const allItems=JOURNEY.flatMap(j=>j.items).concat(HMS_DATA.t1.items,HMS_DATA.t2.items,HMS_DATA.t3.items);

              <div style={{marginBottom:24}}>
                <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12}}>

                  <div style={{fontSize:12,color:C.muted}}>{stationActions.length} totalt</div>
                </div>
                <div style={{display:"flex",gap:2,marginBottom:12,borderBottom:`1px solid ${C.line}`}}>
                  {[['open','Åpne',openA.length],['in_progress','Under arbeid',inProgA.length],['completed','Lukket',doneA.length]].map(([key,label,count])=>(
                    <button key={key} onClick={()=>setActionTab(key)} style={{padding:"10px 14px",background:"transparent",color:actionTab===key?C.ink:C.muted,fontSize:13,fontWeight:actionTab===key?600:400,borderBottom:`2px solid ${actionTab===key?C.ink:"transparent"}`,marginBottom:-1}}>

                </div>

                {shown.length===0&&(
                  <div style={{padding:"28px 16px",color:C.muted,fontSize:13,textAlign:"center"}}>
