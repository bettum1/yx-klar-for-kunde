  @media(min-width:1024px){
    #root{max-width:960px}

  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  textarea,input{font-family:inherit;font-size:16px;border:none;outline:none;background:transparent;color:inherit;resize:none}
  input[type="file"]{display:none}
  @keyframes rec{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .loader{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  .fadeUp{animation:fadeUp .4s ease-out both}
</style>

/* ── Voice: seamless speech-to-text, single button ── */
function Voice({onText}){
  const[state,setState]=useState('idle'); // idle|listen|fallback
  const[interim,setInterim]=useState('');
  const rRef=useRef(null);const mRef=useRef(null);const chunks=useRef([]);const tRef=useRef(null);const[dur,setDur]=useState(0);
  const listening=useRef(false);

  const stop=()=>{
    listening.current=false;
    if(rRef.current){try{rRef.current.stop();}catch(e){}}
    if(mRef.current&&mRef.current.state==='recording'){mRef.current.stop();}
    clearInterval(tRef.current);
    rRef.current=null;setState('idle');setInterim('');setDur(0);
  };

  const start=()=>{
    if(state!=='idle'){stop();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      try{
        const r=new SR();
        r.lang='nb-NO';r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
        r.onresult=e=>{
          let fin='',tmp='';
          for(let i=0;i<e.results.length;i++){
            if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';
            else tmp+=e.results[i][0].transcript;
          }
          if(fin.trim()&&onText)onText(fin.trim());
          setInterim(tmp);
        };
        r.onerror=e=>{
          if(e.error==='not-allowed'){alert('Gi tilgang til mikrofon i nettleserinnstillingene.');stop();return;}
          stop();startRecording();
        };
        r.onend=()=>{
          // Safari stops after silence — auto-restart if still listening
          if(listening.current){try{r.start();}catch(e){stop();}}
          else{setState('idle');setInterim('');}
        };
        rRef.current=r;listening.current=true;r.start();setState('listen');
      }catch(e){startRecording();}
    }else{startRecording();}
  };

  const startRecording=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
      const mr=new MediaRecorder(stream,{mimeType:mime});
      chunks.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunks.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        if(chunks.current.length>0){
          const blob=new Blob(chunks.current,{type:mime});
          transcribeAudio(blob);
        }
        clearInterval(tRef.current);setState('idle');setDur(0);
      };
      mRef.current=mr;mr.start();setState('fallback');setDur(0);
      tRef.current=setInterval(()=>setDur(d=>d+1),1000);
    }catch(e){alert('Kunne ikke starte mikrofon. Sjekk tillatelser.');}
  };

  const transcribeAudio=async(blob)=>{
    // Try to transcribe via Supabase Edge Function or show instruction
    setInterim('Bearbeider...');
    try{
      const formData=new FormData();
      formData.append('file',blob,'audio.webm');
      formData.append('model','whisper-large-v3-turbo');
      formData.append('language','no');
      formData.append('response_format','text');
      // Try Groq free Whisper endpoint
      const resp=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{
        method:'POST',headers:{'Authorization':'Bearer gsk_placeholder'},body:formData
      });
      if(resp.ok){const text=await resp.text();if(text.trim()&&onText)onText(text.trim());}
      else{if(onText)onText('[Lydopptak '+dur+'s — bruk tastatur-mikrofon for tekst]');}
    }catch(e){
      if(onText)onText('[Lydopptak '+dur+'s]');
    }
    setInterim('');
  };

  const stopFallback=()=>{if(mRef.current&&mRef.current.state==='recording')mRef.current.stop();};

  return(
    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
      {interim&&<span style={{fontSize:11,color:"#888",fontStyle:"italic",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{interim}</span>}
      <button onClick={state==='fallback'?stopFallback:start} style={{
        width:44,height:44,borderRadius:12,
        background:state!=='idle'?R:'#f0ede5',
        color:state!=='idle'?'#fff':'#888',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:state==='fallback'?12:18,fontWeight:700,
        animation:state!=='idle'?'rec 1s infinite':'none',
        transition:'all .15s'
      }}>
        {state==='idle'?'🎙️':state==='listen'?'⏸':dur+'s'}
      </button>
    </div>
  );
}

/* ── Camera with Supabase Storage upload ── */
async function uploadPhoto(file,userId){
  // Compress image before upload (max 1600px, 80% quality)
  const compressed=await compressImage(file);
  const ext=file.name.split('.').pop()||'jpg';
  const path=`${userId}/${Date.now()}-${Math.random().toString(36).slice(2,9)}.${ext}`;
  const{data,error}=await sb.storage.from('visit-photos').upload(path,compressed,{contentType:file.type||'image/jpeg',upsert:false});
  if(error)throw error;
  const{data:urlData}=sb.storage.from('visit-photos').getPublicUrl(path);
  return{path:data.path,url:urlData.publicUrl};
}

async function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=1600,maxH=1600;
        let w=img.width,h=img.height;
        if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w*=r;h*=r;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('Compress failed')),'image/jpeg',.8);
      };
      img.onerror=reject;img.src=e.target.result;
    };
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}

function Cam({photos,onAdd,onRemove,userId}){
  const ref=useRef();
  const[uploading,setUploading]=useState(false);
  const h=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    e.target.value="";
    if(!navigator.onLine){
      alert("Du er offline. Bilder kan ikke lastes opp nå. Ta notat i stedet, så fikser vi bilde når du er online.");
      return;
    }
    setUploading(true);
    try{
      const{path,url}=await uploadPhoto(f,userId);
      onAdd({path,url,thumb:url});
    }catch(err){
      console.error('Upload failed:',err);
      alert('Kunne ikke laste opp bilde: '+(err.message||'ukjent feil')+'\n\nSjekk at storage-policy er satt i Supabase.');
    }finally{setUploading(false);}
  };
  return(
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
      {(photos||[]).map((p,i)=>(
        <div key={i} style={{position:"relative",width:64,height:64,borderRadius:8,overflow:"hidden",border:"2px solid #eae7df"}}>
          <img src={p.thumb||p.url||p} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="Bevis"/>
          <button onClick={()=>onRemove(i)} aria-label="Slett bilde" style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.75)",color:"#fff",borderRadius:10,width:22,height:22,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
      ))}
      <button onClick={()=>ref.current?.click()} disabled={uploading} aria-label="Ta bilde" style={{width:64,height:64,borderRadius:8,border:"2px dashed #bbb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#888",background:"#fafaf7",opacity:uploading?.5:1}}>
        {uploading?<div className="loader" style={{width:18,height:18,borderWidth:2,borderColor:"#ccc",borderTopColor:R}}/>:"📷"}
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" onChange={h}/>
    </div>
  );
}

/* ── Scoring — max:1=Nei/Ja ── */

/* ── Autosave helpers (user-scoped) ── */
const DRAFT_KEY='yx_kfk_draft';
function saveDraft(userId,station,scores,na,notes,photos,visitNote,catIdx,includeHms){
  if(!station||!userId)return;
  try{
    localStorage.setItem(DRAFT_KEY+'_'+userId,JSON.stringify({
      stationId:station.id,stationName:station.name,userId,
      scores,na,notes,photos,visitNote,catIdx,includeHms,
      savedAt:Date.now()
    }));
  }catch(e){console.warn('Autosave failed:',e);}
}
function loadDraft(userId){
  if(!userId)return null;
  try{const d=localStorage.getItem(DRAFT_KEY+'_'+userId);return d?JSON.parse(d):null;}
  catch(e){return null;}
}
function clearAutosave(userId){
  if(!userId)return;
  try{localStorage.removeItem(DRAFT_KEY+'_'+userId);}catch(e){}
}

/* ── Offline cache ── */
const CACHE_KEY='yx_kfk_cache';
const QUEUE_KEY='yx_kfk_queue';

function saveCache(stations,visits){
  try{
    const data={stations,visits:visits.slice(0,100),savedAt:Date.now()};
    localStorage.setItem(CACHE_KEY,JSON.stringify(data));
  }catch(e){console.warn('Cache save failed:',e);}
}
function loadCache(){
  try{const d=localStorage.getItem(CACHE_KEY);return d?JSON.parse(d):null;}
  catch(e){return null;}
}
function queueVisit(visit){
  try{
    const q=JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');
    q.push({...visit,queuedAt:Date.now(),id:'local-'+Date.now()});
    localStorage.setItem(QUEUE_KEY,JSON.stringify(q));
    return true;
  }catch(e){return false;}
}
function getQueue(){
  try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');}catch(e){return[];}
}
function clearFromQueue(localId){
  try{
    const q=JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');
    localStorage.setItem(QUEUE_KEY,JSON.stringify(q.filter(v=>v.id!==localId)));
  }catch(e){}
}

/* ── Error Boundary — prevents full app crash ── */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error('App crashed:',err,info);}
  render(){
    if(this.state.err){
      return(
        <div style={{minHeight:"100vh",background:"#0C2340",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
          <div style={{fontSize:64,marginBottom:20}}>⚠️</div>
          <div style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:12}}>Noe gikk galt</div>
          <div style={{color:"rgba(255,255,255,.6)",fontSize:14,marginBottom:32,maxWidth:400}}>Appen har møtt en feil. Arbeidet ditt er automatisk lagret. Trykk under for å laste inn på nytt.</div>
          <button onClick={()=>window.location.reload()} style={{padding:"15px 32px",background:"#CF122D",color:"#fff",borderRadius:12,fontWeight:700,fontSize:15,border:"none"}}>Last inn på nytt</button>
          <div style={{color:"rgba(255,255,255,.3)",fontSize:11,marginTop:24,maxWidth:400,fontFamily:"monospace"}}>{String(this.state.err.message||this.state.err)}</div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App(){

  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[view,setView]=useState("login");
  const[stations,setStations]=useState([]);
  const[stLoad,setStLoad]=useState(false);
  const[station,setStation]=useState(null);
  const[catIdx,setCatIdx]=useState(0);
  const[scores,setScores]=useState({});
  const[na,setNa]=useState({});
  const[notes,setNotes]=useState({});
  const[photos,setPhotos]=useState({});
  const[visitNote,setVisitNote]=useState("");
  const[visits,setVisits]=useState([]);
  const[selfEvals,setSelfEvals]=useState([]);
  const[saving,setSaving]=useState(false);
  const[loc,setLoc]=useState(null);
  const[search,setSearch]=useState("");
  const[lastVisit,setLastVisit]=useState(null);
  const[loginEmail,setLoginEmail]=useState("");
  const[loginPw,setLoginPw]=useState("");
  const[loginErr,setLoginErr]=useState("");
  const[loginLoad,setLoginLoad]=useState(false);
  const[showRef,setShowRef]=useState(false);
  const[showAll,setShowAll]=useState(false);
  const[includeHms,setIncludeHms]=useState(null); // null=not asked, true/false
  const[stationView,setStationView]=useState(null); // station detail view
  const[draft,setDraft]=useState(null); // recovered draft
  const[online,setOnline]=useState(navigator.onLine);
  const[queueCount,setQueueCount]=useState(0);
  const[syncing,setSyncing]=useState(false);
  const[actions,setActions]=useState([]);
  const[campaigns,setCampaigns]=useState([]);
  const[regions,setRegions]=useState([]);

  // Dynamic journey steps — 4 base + optional HMS
  const journeySteps=useMemo(()=>includeHms?[...JOURNEY,hmsStep()]:JOURNEY,[includeHms]);

  // Autosave on changes during audit
  useEffect(()=>{
    if(view==='audit'&&station){
      const t=setTimeout(()=>saveDraft(user?.id,station,scores,na,notes,photos,visitNote,catIdx,includeHms),500);
      return()=>clearTimeout(t);
    }
  },[view,station,scores,na,notes,photos,visitNote,catIdx,includeHms]);

  // Check for draft on load
  useEffect(()=>{
    if(view==='home'&&stations.length>0&&!draft){
      const d=loadDraft(user?.id);
      if(d&&Date.now()-d.savedAt<7*24*3600*1000){ // 7 days
        const st=stations.find(s=>s.id===d.stationId);
        if(st)setDraft({...d,station:st});
      }
    }
  },[view,stations]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session){setUser(session.user);loadProf(session.user.id);}else setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{if(s){setUser(s.user);loadProf(s.user.id);}else{setUser(null);setProfile(null);setView("login");setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[]);

  const loadProf=async uid=>{const{data}=await sb.from("profiles").select("*").eq("id",uid).single();setProfile(data);if(data)await loadData();setLoading(false);setView("home");};
  const loadData=async()=>{
    setStLoad(true);
    // Try cache first for instant load
    const cached=loadCache();
    if(cached){setStations(cached.stations||[]);setVisits(cached.visits||[]);setStLoad(false);}

    // Update queue count
    setQueueCount(getQueue().length);

    if(!navigator.onLine){setStLoad(false);return;}

    try{
      const{data:st}=await sb.from("stations").select("*").order("name");
      if(st){setStations(st);}
      const{data:v}=await sb.from("visits").select("*").order("created_at",{ascending:false}).limit(200);
      if(v){setVisits(v);}
      const{data:se}=await sb.from("visits").select("*").eq("visit_role","sl").order("created_at",{ascending:false}).limit(300);setSelfEvals(se||[]);
      const{data:ac}=await sb.from("actions").select("*").order("created_at",{ascending:false}).limit(200);setActions(ac||[]);
      const{data:camp}=await sb.from("campaigns").select("*").eq("active",true).limit(3);setCampaigns(camp||[]);
      const{data:reg}=await sb.from("regions").select("*");setRegions(reg||[]);
      if(st&&v)saveCache(st,v);
    }catch(e){console.warn('Data load failed, using cache:',e);}
    finally{setStLoad(false);}

    if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>setLoc({lat:p.coords.latitude,lng:p.coords.longitude}),()=>{});
  };

  // Online/offline detection + auto-sync
  useEffect(()=>{
    const goOnline=()=>{setOnline(true);syncQueue();};
    const goOffline=()=>setOnline(false);
    window.addEventListener('online',goOnline);
    window.addEventListener('offline',goOffline);
    // Sync on startup if already online and user is loaded
    if(navigator.onLine&&user)setTimeout(syncQueue,1000);
    return()=>{window.removeEventListener('online',goOnline);window.removeEventListener('offline',goOffline);};
  },[user]);

  // Sync queued visits when online
  const syncQueue=async()=>{
    const q=getQueue();
    if(q.length===0||syncing)return;
    setSyncing(true);
    let synced=0;
    for(const qv of q){
      try{
        const{id,queuedAt,photos:photosByItem,...visitData}=qv;
        const{data,error}=await sb.from("visits").insert(visitData).select().single();
        if(!error&&data){
          // Save photo records if any
          if(photosByItem){
            const recs=[];
            Object.entries(photosByItem).forEach(([itemId,arr])=>{
              (arr||[]).forEach(p=>{if(p.path)recs.push({visit_id:data.id,item_id:String(itemId),storage_path:p.path,public_url:p.url,uploaded_by:user.id});});
            });
            if(recs.length>0)await sb.from("visit_photos").insert(recs);
          }
          clearFromQueue(id);synced++;
        }
      }catch(e){console.warn('Sync failed:',e);break;}
    }
    setQueueCount(getQueue().length);setSyncing(false);
    if(synced>0)await loadData();
  };
  const login=async()=>{setLoginErr("");setLoginLoad(true);const{error}=await sb.auth.signInWithPassword({email:loginEmail,password:loginPw});if(error)setLoginErr("Feil e-post eller passord");setLoginLoad(false);};
  const logout=async()=>{
    if(queueCount>0){
      if(!confirm(`Du har ${queueCount} ulagrede besøk i kø. Logg ut likevel?`))return;
    }else{
      if(!confirm("Logge ut?"))return;
    }
    clearAutosave(user?.id);
    try{localStorage.removeItem(CACHE_KEY);localStorage.removeItem(QUEUE_KEY);}catch(e){}
    await sb.auth.signOut();
  };

  const S=(id,v)=>setScores(s=>({...s,[String(id)]:v}));
  const G=id=>scores[String(id)]??null;
  const NA=(id,v)=>{setNa(n=>({...n,[String(id)]:v}));if(v)setScores(s=>{const n={...s};delete n[String(id)];return n;});};
  const isNA=id=>na[String(id)];
  const SN=(id,v)=>setNotes(n=>({...n,[String(id)]:v}));
  const GN=id=>notes[String(id)]||"";

  const aMax=journeySteps.reduce((s,c)=>s+c.items.filter(i=>!isNA(i.id)).reduce((a,b)=>a+b.max,0),0);
  const tScore=Object.entries(scores).filter(([k])=>!na[k]).reduce((s,[,v])=>s+(v||0),0);
  const tPct=aMax>0?Math.round(tScore/aMax*100):0;

  const submit=async()=>{
    if(!station||!profile)return;setSaving(true);
    const photoCount=Object.values(photos).reduce((s,a)=>s+(a?.length||0),0);
    const v={station_id:station.id,user_id:user.id,visit_role:profile.role==="regionssjef"?"rs":"sl",scores,na_items:Object.keys(na).filter(k=>na[k]),notes,visit_note:visitNote,total_score:tScore,max_score:aMax,pct:tPct,photo_count:photoCount};

    // If offline, queue it
    if(!navigator.onLine){
      const queued=queueVisit({...v,photos});
      setSaving(false);
      if(queued){
        setQueueCount(getQueue().length);
        setLastVisit({...v,stationName:station.name,id:'local',created_at:new Date().toISOString(),offline:true});
        setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setIncludeHms(null);
        clearAutosave(user?.id);setView("done");
      }else{alert("Kunne ikke lagre lokalt. Sjekk lagringsplass.");}
      return;
    }

    try{
      const{data,error}=await sb.from("visits").insert(v).select().single();
      if(error)throw error;

      if(photoCount>0){
        const photoRecords=[];
        Object.entries(photos).forEach(([itemId,arr])=>{
          (arr||[]).forEach(p=>{if(p.path)photoRecords.push({visit_id:data.id,item_id:String(itemId),storage_path:p.path,public_url:p.url,uploaded_by:user.id});});
        });
        if(photoRecords.length>0){
          const{error:pErr}=await sb.from("visit_photos").insert(photoRecords);
          if(pErr)console.error("Photo link error:",pErr);
        }
      }

      setLastVisit({...data,stationName:station.name});
      const{data:vv}=await sb.from("visits").select("*").order("created_at",{ascending:false}).limit(200);
      if(vv){setVisits(vv);saveCache(stations,vv);}
      setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setIncludeHms(null);
      clearAutosave(user?.id);setView("done");
    }catch(err){
      // Fallback to queue if online save fails
      const queued=queueVisit({...v,photos});
      if(queued){
        setQueueCount(getQueue().length);
        alert("Ikke tilkoblet — besøket er lagret lokalt og sendes automatisk når du er online.");
        setLastVisit({...v,stationName:station.name,id:'local',created_at:new Date().toISOString(),offline:true});
        setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setIncludeHms(null);
        clearAutosave(user?.id);setView("done");
      }else{alert("Kunne ikke lagre besøk: "+(err.message||"ukjent feil"));}
    }finally{setSaving(false);}
  };

    const date=new Date(visit.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});

    const html=`<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><title>Besøksrapport — ${esc(stationName)}</title><style>

      @media print{.btn{display:none}}
    </style></head><body>
      <div class="header"><div class="logo">YX</div><div class="tag">Klar for Kunde — Besøksrapport</div></div>

        ${areas.map(a=>`<div class="area"><div class="area-name">${a.icon} ${a.name}</div><div class="area-pct" style="color:${a.pct>=85?"#16a34a":a.pct>=70?"#65a30d":a.pct>=55?"#d97706":a.pct>=40?"#ea580c":"#dc2626"}">${a.pct}%</div><div class="bar"><div class="bar-fill" style="width:${a.pct}%;background:${a.pct>=85?"#16a34a":a.pct>=70?"#65a30d":a.pct>=55?"#d97706":a.pct>=40?"#ea580c":"#dc2626"}"></div></div></div>`).join('')}

    const blob=new Blob([html],{type:'text/html'});

  /* ── LOADING ── */

      )}

      <div style={{padding:"30px 20px 20px",textAlign:"center",color:"#aaa",fontSize:10}}>
        YX Klar for Kunde · v19.2 · {online?"🟢 Online":"🔴 Offline"}
      </div>
    </div>
  );}

  /* ── AUDIT ── */
  if(view==="audit"&&station){
    const cat=journeySteps[catIdx];
    const ci=cat.items.filter(i=>!isNA(i.id));
    const cMax=ci.reduce((s,i)=>s+i.max,0);
    const cScore=ci.reduce((s,i)=>s+(G(i.id)||0),0);
    const isLast=catIdx===journeySteps.length-1;
    const se=isRS?getSE(station.id):null;

    // FIX: items that need evidence (scored non-max, not N/A, no photo and no comment)
    const needsEvidence=cat.items.filter(i=>{
      if(isNA(i.id))return false;
      const v=G(i.id);
      if(v===null||v>=i.max)return false; // not scored or godkjent
      const hasNote=GN(i.id).trim().length>0;
      const hasPhoto=(photos[i.id]||[]).length>0;
      return!hasNote&&!hasPhoto;
    });
    const canAdvance=needsEvidence.length===0;

    const scrollToFirstUnfinished=()=>{
      if(needsEvidence.length===0)return true;
      const first=needsEvidence[0];
      const el=document.getElementById('item-'+first.id);
      if(el){el.scrollIntoView({behavior:'smooth',block:'center'});}
      return false;
    };

    return(
      <div style={{paddingBottom:130}}>
        {/* Top banner — same as all pages */}
        <div style={{background:D,padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={cancelAudit} style={{color:"#7799bb",fontSize:13,fontWeight:600}}>←</button>
            <img src={LW} alt="YX" style={{height:22}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#7799bb"}}>{profile?.name}</span>
            <button onClick={logout} aria-label="Logg ut" style={{fontSize:12,color:"#5577aa",fontWeight:600,padding:"6px 10px",minHeight:32}}>Logg ut</button>
          </div>
        </div>
        {/* ── Journey Hero ── */}
        <div style={{position:"relative",height:180,background:D,overflow:"hidden"}}>
          <img src={cat.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:.35}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(to top, ${D} 0%, transparent 60%)`}}/>
          <div style={{position:"absolute",bottom:16,left:16,right:16}}>
            {/* Journey steps */}
            <div style={{display:"flex",gap:4,marginBottom:12}}>
              {journeySteps.map((j,i)=>(
                <div key={j.id} style={{flex:1,height:4,borderRadius:2,background:i<=catIdx?R:"rgba(255,255,255,.2)",transition:"background .3s"}}/>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:28}}>{cat.icon}</span>
              <div>
                <div style={{color:"rgba(255,255,255,.5)",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>Steg {cat.step} av 4</div>
                <div style={{color:"#fff",fontSize:20,fontWeight:800}}>{cat.name}</div>
              </div>
            </div>
            <div style={{color:"rgba(255,255,255,.6)",fontSize:12,marginTop:6}}>{cat.desc}</div>
          </div>
        </div>

        {/* Reference image toggle */}
        <button onClick={()=>setShowRef(!showRef)} style={{width:"100%",padding:"10px 16px",background:"#fff",borderBottom:"1px solid #eae7df",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,fontWeight:600,color:B}}>📐 Slik skal det se ut (kundereisen)</span>
          <span style={{fontSize:11,color:"#888"}}>{showRef?"▲ Skjul":"▼ Vis"}</span>
        </button>
        {showRef&&<div style={{padding:16,background:"#f5f3ee"}}><img src={cat.img} style={{width:"100%",borderRadius:10,border:"2px solid #eae7df"}} alt="Referanse"/></div>}

        {/* Checklist items */}
        <div style={{padding:"16px 16px",display:"flex",flexDirection:"column",gap:20}}>
          {cat.items.map((item,idx)=>{
            const val=G(item.id);
            const ina=isNA(item.id);
            const opts=sOpts(item.max);
            const seVal=getSES(se,item.id);
            const seIsNa=se?.na_items?.includes(String(item.id));
            const seL=seVal!=null&&!seIsNa?lFor(item.max,seVal):null;
            const myL=val!=null&&!ina?lFor(item.max,val):null;
            const gap=isRS&&seL&&myL&&seL.c!==myL.c;

            return(
              <div key={item.id} id={`item-${item.id}`} className="fadeUp" style={{background:ina?"#f5f3ee":"#fff",border:ina?"1px dashed #ddd":"1px solid #eae7df",borderRadius:14,padding:"18px",opacity:ina?.4:1,animationDelay:`${idx*40}ms`,boxShadow:"0 1px 3px rgba(12,35,64,.04)",scrollMarginTop:"100px"}}>
                {/* Item number + text */}
                <div style={{display:"flex",gap:10,marginBottom:10}}>
                  <div style={{width:28,height:28,borderRadius:8,background:val!=null?lFor(item.max,val).c+"18":D+"08",color:val!=null?lFor(item.max,val).c:D,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{item.id}</div>
                  <div style={{fontSize:15,color:D,lineHeight:1.5}}>{item.t.includes(" — ")?<><span style={{fontWeight:800}}>{item.t.split(" — ")[0]}</span><span style={{fontWeight:400,color:"#555"}}> — {item.t.split(" — ").slice(1).join(" — ")}</span></>:<span style={{fontWeight:600}}>{item.t}</span>}</div>
                </div>

                {/* Self-eval badge for RS */}
                {isRS&&seL&&!ina&&(
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,padding:"6px 10px",background:"#f0f7ff",borderRadius:8,border:"1px solid #dbeafe"}}>
                    <span style={{fontSize:11,color:"#555",fontWeight:500}}>Stasjonens vurdering:</span>
                    <span style={{background:seL.c+"22",color:seL.c,padding:"2px 8px",borderRadius:5,fontSize:11,fontWeight:700}}>{seL.l}</span>
                  </div>
                )}

                {/* Score buttons — auto-scroll to next on Godkjent */}
                {!ina&&(
                  <div style={{display:"flex",gap:6,marginBottom:8}}>
                    {opts.map(o=>(
                      <button key={o.v+o.l} onClick={()=>{
                        S(item.id,o.v);
                        // Auto-scroll to next item if scoring Godkjent (no evidence needed)
                        if(o.v===item.max){
                          const nextIdx=cat.items.findIndex(i=>i.id===item.id)+1;
                          if(nextIdx<cat.items.length){
                            setTimeout(()=>{
                              const nextEl=document.getElementById('item-'+cat.items[nextIdx].id);
                              if(nextEl)nextEl.scrollIntoView({behavior:'smooth',block:'start'});
                            },300);
                          }
                        }
                      }}
                        style={{flex:1,padding:"14px 6px",borderRadius:10,minHeight:56,background:val===o.v?o.c:"#f5f3ee",color:val===o.v?"#fff":"#777",fontSize:13,fontWeight:700,textAlign:"center",border:val===o.v?`2px solid ${o.c}`:"2px solid transparent",transition:"all .15s"}}>{o.l}</button>
                    ))}
                  </div>
                )}

                {/* N/A toggle */}
                <button onClick={()=>NA(item.id,!ina)}
                  style={{fontSize:11,color:ina?R:"#bbb",fontWeight:600,padding:"4px 0"}}>{ina?"↩ Gjør aktuell":"Ikke aktuell"}</button>

                {/* Campaign info card — on campaign-related questions */}
                {!ina&&[5,14,17].includes(item.id)&&campaigns.length>0&&(()=>{
                  const c=campaigns[0];
                  let items=[];try{items=typeof c.items==='string'?JSON.parse(c.items):(c.items||[]);}catch(e){}
                  // Filter by question context
                  const relevant=item.id===5?items:item.id===14?items.filter(i=>['A','B','Drikke','Kiosk','Is','COOP'].includes(i.type)):items.filter(i=>['Drikke','Kiosk','Is','Tilbehør'].includes(i.type));
                  return(
                    <div style={{background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:10,padding:"10px 14px",margin:"10px 0"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:14}}>🎯</span>
                        <span style={{fontSize:11,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:1}}>{c.period} · Gjeldende kampanje</span>
                      </div>
                      <div style={{fontSize:12,color:"#78350f",marginBottom:6,lineHeight:1.5}}>{c.name}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {relevant.slice(0,6).map((ci,i)=>(
                          <div key={i} style={{background:"#fff",border:"1px solid #fde68a",borderRadius:6,padding:"4px 8px",fontSize:11}}>
                            <b style={{color:D}}>{ci.name}</b>
                            {ci.price&&<span style={{color:"#d97706",marginLeft:4,fontWeight:600}}>{ci.price}</span>}
                            {ci.placement&&<span style={{color:"#888",marginLeft:4,fontSize:10}}>· {ci.placement}</span>}
                          </div>
                        ))}
                        {relevant.length>6&&<span style={{fontSize:10,color:"#92400e",padding:"4px 6px"}}>+{relevant.length-6} til</span>}
                      </div>
                    </div>
                  );
                })()}

                {/* Gap warning */}
                {gap&&!ina&&(
                  <div style={{fontSize:13,padding:"10px 14px",borderRadius:8,margin:"8px 0",background:"#fef2f2",color:"#991b1b",border:"1px solid #fecaca",fontWeight:500}}>
                    ⚠️ Gap: stasjonen sier «{seL.l}», du sier «{myL.l}»
                  </div>
                )}

                {/* Coaching question — redesigned as card */}
                {isRS&&!ina&&(
                  <div style={{background:`linear-gradient(135deg, ${D}08, ${R}06)`,borderLeft:`4px solid ${R}`,padding:"10px 14px",borderRadius:"0 10px 10px 0",margin:"10px 0"}}>
                    <div style={{fontSize:10,fontWeight:700,color:R,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Samtalestart</div>
                    <div style={{fontSize:14,color:"#333",fontWeight:500,lineHeight:1.5}}>«{item.q}»</div>
                  </div>
                )}

                {/* Note + voice */}
                {!ina&&(
                  <div style={{display:"flex",alignItems:"flex-start",gap:6,marginTop:10}}>
                    <textarea placeholder="Notat..." value={GN(item.id)} onChange={e=>SN(item.id,e.target.value)}
                      style={{flex:1,minHeight:40,border:"1px solid #eae7df",borderRadius:10,padding:"10px 12px",fontSize:15,color:"#333",background:"#fafaf7"}}/>
                    <Voice onText={t=>SN(item.id,(GN(item.id)?GN(item.id)+" ":"")+t)}/>
                  </div>
                )}
                {!ina&&<Cam userId={user.id} photos={photos[item.id]||[]} onAdd={d=>setPhotos(p=>({...p,[item.id]:[...(p[item.id]||[]),d]}))} onRemove={idx=>setPhotos(p=>({...p,[item.id]:(p[item.id]||[]).filter((_,i)=>i!==idx)}))}/>}

                {/* Evidence required warning */}
                {!ina&&val!==null&&val<item.max&&!GN(item.id).trim()&&!(photos[item.id]||[]).length&&(
                  <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"#fef2f2",border:"1px solid #fecaca",fontSize:13,color:"#991b1b",fontWeight:500}}>
                    📸 Legg til bilde eller kommentar — hva er problemet?
                  </div>
                )}
              </div>
            );
          })}

          {/* Summary on last */}
          {isLast&&(
            <div style={{background:"#fff",border:"2px solid "+D+"22",borderRadius:14,padding:16,marginTop:4}}>
              <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:8}}>📝 Oppsummering</div>
              <div style={{display:"flex",gap:6}}>
                <textarea placeholder="Avtaler, oppfølging, observasjoner..." value={visitNote} onChange={e=>setVisitNote(e.target.value)}
                  style={{flex:1,minHeight:80,border:"1px solid #eae7df",borderRadius:10,padding:"12px",fontSize:15,color:"#333",background:"#fafaf7"}}/>
                <Voice onText={t=>setVisitNote(v=>(v?v+" ":"")+t)}/>
              </div>
            </div>
          )}
        </div>

        {/* Bottom bar */}
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #eae7df",padding:"10px 20px max(14px, env(safe-area-inset-bottom))",maxWidth:960,margin:"0 auto"}}>
          {needsEvidence.length>0&&(
            <div style={{fontSize:11,color:"#991b1b",textAlign:"center",marginBottom:6,fontWeight:500}}>
              ⚠️ {needsEvidence.length} punkt{needsEvidence.length>1?"er":""} trenger bilde eller kommentar
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:12}}>
            <span style={{color:"#888"}}>Kategori {cScore}/{cMax}</span>
            <span style={{fontWeight:800,color:D,fontSize:14}}>{tPct}%</span>
            <span style={{color:"#888"}}>Totalt {tScore}/{aMax}</span>
          </div>

          {/* HMS prompt — shown after step 4 if not yet asked */}
          {catIdx===3&&includeHms===null?(
            <div>
              <div style={{fontSize:12,color:D,fontWeight:600,textAlign:"center",marginBottom:8}}>⚠️ Gjennomføre HMS-tertialpunkter på dette besøket?</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(!scrollToFirstUnfinished())return;setIncludeHms(false);submit();}} disabled={saving} style={{flex:1,padding:"15px",background:"#f0ede5",borderRadius:12,fontWeight:700,color:"#555",fontSize:14,opacity:saving?.6:1}}>{saving?"Lagrer...":"Fullfør uten HMS"}</button>
                <button onClick={()=>{if(!scrollToFirstUnfinished())return;setIncludeHms(true);setCatIdx(4);setShowRef(false);window.scrollTo(0,0);}} style={{flex:1,padding:"15px",background:"#d97706",color:"#fff",borderRadius:12,fontWeight:700,fontSize:14}}>⚠️ Ja, HMS →</button>
              </div>
            </div>
          ):(
            <div style={{display:"flex",gap:8}}>
              {catIdx>0&&<button onClick={()=>{setCatIdx(i=>i-1);setShowRef(false);window.scrollTo(0,0);}} style={{flex:1,padding:"15px",background:"#f0ede5",borderRadius:12,fontWeight:700,color:"#555",fontSize:15}}>←</button>}
              {!isLast?<button onClick={()=>{if(!scrollToFirstUnfinished())return;setCatIdx(i=>i+1);setShowRef(false);window.scrollTo(0,0);}} style={{flex:2,padding:"15px",background:canAdvance?D:"#ccc",color:"#fff",borderRadius:12,fontWeight:700,fontSize:15}}>Neste steg →</button>
              :<button onClick={()=>{if(!scrollToFirstUnfinished())return;submit();}} disabled={saving} style={{flex:2,padding:"15px",background:canAdvance?R:"#ccc",color:"#fff",borderRadius:12,fontWeight:800,fontSize:15,opacity:saving?.6:1}}>{saving?"Lagrer...":"Fullfør besøk ✓"}</button>}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── DONE — with AI summary ── */
  if(view==="done"&&lastVisit){
    const v=lastVisit;const se=isRS?getSE(v.station_id):null;

    // Generate visit summary from data
    const summary=(()=>{
      const lines=[];
      const scores=v.scores||{};
      const naItems=v.na_items||[];

      // Area breakdown
      const areas=JOURNEY.map(j=>{
        let tot=0,max=0;
        j.items.forEach(item=>{const s=scores[String(item.id)];if(s!==undefined&&!naItems.includes(String(item.id))){tot+=s;max+=item.max;}});
        const pct=max>0?Math.round(tot/max*100):null;
        return{name:j.name,icon:j.icon,pct};
      }).filter(a=>a.pct!==null);

      const best=areas.reduce((a,b)=>a.pct>b.pct?a:b);
      const worst=areas.reduce((a,b)=>a.pct<b.pct?a:b);

      lines.push(`${v.stationName}: ${v.pct}% totalt.`);

      if(best.pct!==worst.pct){
        lines.push(`Sterkest på ${best.icon} ${best.name} (${best.pct}%). Svakest på ${worst.icon} ${worst.name} (${worst.pct}%).`);
      }

      // Failed items
      const fails=Object.entries(scores).filter(([k,s])=>s===0&&!naItems.includes(k)).map(([k])=>{
        const item=JOURNEY.flatMap(j=>j.items).find(i=>String(i.id)===k);
        return item?item.t.split(" — ")[0]:null;
      }).filter(Boolean);

      if(fails.length>0)lines.push(`Ikke godkjent: ${fails.join(", ")}.`);

      // Partial items
      const partials=Object.entries(scores).filter(([k,s])=>s>0&&s<5&&!naItems.includes(k)).length;
      if(partials>0)lines.push(`${partials} punkt${partials>1?"er":""} vurdert som «Delvis».`);

      // Gap with SL
      if(se){
        const gap=se.pct-v.pct;
        if(gap>10)lines.push(`Stasjonens selvevaluering lå ${gap}pp over din score — de overvurderer seg på flere punkter.`);
        else if(gap<-10)lines.push(`Du scoret ${Math.abs(gap)}pp høyere enn stasjonen selv — de er strengere mot seg selv.`);
        else lines.push(`Gap mot selvevaluering: ${Math.abs(gap)}pp — godt kalibrert.`);
      }

      // Notes summary
      const noteCount=Object.values(v.notes||{}).filter(n=>n&&n.trim()).length;
      if(noteCount>0)lines.push(`${noteCount} notat${noteCount>1?"er":""} registrert.`);
      if(v.photo_count>0)lines.push(`${v.photo_count} foto lagret.`);

      // Recommendation
      if(worst.pct<50)lines.push(`Anbefaling: Prioriter ${worst.name.toLowerCase()} ved neste besøk.`);
      else if(v.pct>=80)lines.push(`Stasjonen holder god standard. Anerkjenn innsatsen.`);

      return lines;
    })();

    return(
      <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${D} 0%,#162d4a 100%)`,padding:"40px 20px",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div className="fadeUp" style={{width:80,height:80,borderRadius:40,background:pCol(v.pct),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,marginBottom:16,boxShadow:`0 8px 32px ${pCol(v.pct)}44`}}>✓</div>
        <div className="fadeUp" style={{color:"rgba(255,255,255,.5)",fontSize:11,letterSpacing:2,textTransform:"uppercase",animationDelay:"100ms"}}>{isRS?"Coaching-besøk":"Selvevaluering"} registrert</div>
        <div className="fadeUp" style={{color:"#fff",fontSize:22,fontWeight:800,marginTop:8,animationDelay:"150ms"}}>{v.stationName}</div>
        <div className="fadeUp" style={{fontSize:56,fontWeight:900,color:pCol(v.pct),marginTop:20,lineHeight:1,animationDelay:"200ms"}}>{v.pct}%</div>
        <div className="fadeUp" style={{color:"rgba(255,255,255,.6)",fontSize:14,marginTop:6,animationDelay:"250ms"}}>{pLbl(v.pct)}</div>

        {/* Area bars */}
        <div className="fadeUp" style={{width:"100%",maxWidth:400,marginTop:24,animationDelay:"300ms"}}>
          {JOURNEY.map(j=>{
            let tot=0,max=0;
            j.items.forEach(item=>{const s=v.scores?.[String(item.id)];if(s!==undefined&&!v.na_items?.includes(String(item.id))){tot+=s;max+=item.max;}});
            const pct=max>0?Math.round(tot/max*100):0;
            return(
              <div key={j.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:13,width:24,textAlign:"center"}}>{j.icon}</span>
                <div style={{flex:1}}>
                  <div style={{height:6,background:"rgba(255,255,255,.1)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",background:pCol(pct),width:pct+"%",borderRadius:3,transition:"width .5s"}}/>
                  </div>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:pCol(pct),width:36,textAlign:"right"}}>{pct}%</span>
              </div>
            );
          })}
        </div>

        {/* Gap */}
        {se&&isRS&&(
          <div className="fadeUp" style={{marginTop:16,padding:"12px 20px",background:"rgba(255,255,255,.08)",borderRadius:12,border:"1px solid rgba(255,255,255,.1)",animationDelay:"350ms"}}>
            <div style={{color:"rgba(255,255,255,.7)",fontSize:13}}>Egenvurdering: <b style={{color:"#60a5fa"}}>{se.pct}%</b> · Gap: <b>{Math.abs(v.pct-se.pct)}pp</b></div>
          </div>
        )}

        {/* AI Summary */}
        <div className="fadeUp" style={{width:"100%",maxWidth:400,marginTop:20,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:14,padding:"16px",animationDelay:"400ms"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
            <span style={{fontSize:14}}>🤖</span>
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>Oppsummering</span>
            <span style={{fontSize:9,fontWeight:600,color:"#7c3aed",background:"rgba(124,58,237,.2)",padding:"2px 6px",borderRadius:4}}>AI</span>
          </div>
          {summary.map((line,i)=>(
            <div key={i} style={{fontSize:13,color:"rgba(255,255,255,.75)",lineHeight:1.6,marginBottom:4}}>{line}</div>
          ))}
        </div>

        <div className="fadeUp" style={{color:"#4ade80",fontSize:12,marginTop:16,fontWeight:600,animationDelay:"450ms"}}>✓ Lagret i database</div>
        <div className="fadeUp" style={{display:"flex",gap:10,marginTop:28,animationDelay:"500ms"}}>
          <button onClick={()=>generateReport(v,v.stationName)} style={{padding:"15px 24px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",borderRadius:12,fontWeight:700,fontSize:14}}>📄 PDF-rapport</button>
          <button onClick={()=>{setStationView(null);setStation(null);setView("home");}} style={{padding:"15px 24px",background:R,color:"#fff",borderRadius:12,fontWeight:700,fontSize:14}}>Tilbake</button>
        </div>
      </div>
    );
  }

  /* ── STATION DETAIL ── */
  if(view==="stationDetail"&&stationView){
    const sv=stationView;
    const stVisits=visits.filter(v=>v.station_id===sv.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const lastRS=stVisits.find(v=>v.visit_role==="rs");
    const lastSL=stVisits.find(v=>v.visit_role==="sl");
    const slVisits=stVisits.filter(v=>v.visit_role==="sl");
    // Unresolved: items scored <max on last SL visit
    const ref=lastSL||lastRS;
    const unresolved=ref?Object.entries(ref.scores||{}).filter(([k,v])=>v<5&&!ref.na_items?.includes(k)).map(([k,v])=>{
      const item=JOURNEY.flatMap(j=>j.items).find(i=>String(i.id)===k);
      return item?{...item,score:v,note:ref.notes?.[k]||""}:null;
    }).filter(Boolean):[];

    // ── AI COACHING ANALYSIS ──
    const coaching=(()=>{
      if(!lastSL)return null;
      const tips=[];

      // 1. Find consistently low areas
      const areaScores=JOURNEY.map(j=>{
        let tot=0,max=0;
        j.items.forEach(item=>{const s=lastSL.scores?.[String(item.id)];if(s!==undefined){tot+=s;max+=item.max;}});
        return{name:j.name,icon:j.icon,pct:max>0?Math.round(tot/max*100):0};
      }).sort((a,b)=>a.pct-b.pct);
      const weakest=areaScores[0];
      if(weakest.pct<60)tips.push({type:"area",icon:"🔴",text:`${weakest.icon} ${weakest.name} scorer ${weakest.pct}% — dette bør være hovedfokus på besøket. Start samtalen her.`});
      else if(weakest.pct<75)tips.push({type:"area",icon:"🟡",text:`${weakest.icon} ${weakest.name} er svakeste området (${weakest.pct}%). Rom for forbedring — ta det opp som coaching-tema.`});

      // 2. Gap analysis
      if(lastSL&&lastRS){
        const gap=lastSL.pct-lastRS.pct;
        if(gap>15)tips.push({type:"gap",icon:"⚠️",text:`Stasjonsleder vurderer seg ${gap}pp høyere enn regionssjef. Stor blind spot — vær konkret og vis med eksempler.`});
        else if(gap>5)tips.push({type:"gap",icon:"💬",text:`Moderat gap (${gap}pp) mellom stasjonens og din vurdering. Bruk spørsmål som «hva ser du selv når du går forplassen?» for å bygge bevissthet.`});
        else if(Math.abs(gap)<=5)tips.push({type:"gap",icon:"✅",text:`Dere er godt kalibrert (gap: ${Math.abs(gap)}pp). Fokuser på å løfte de svakeste enkeltpunktene.`});

        // Per-question blind spots: SL scored godkjent but RS scored lower
        const blindSpots=JOURNEY.flatMap(j=>j.items.map(item=>{
          const slS=lastSL.scores?.[String(item.id)];
          const rsS=lastRS.scores?.[String(item.id)];
          if(slS===undefined||rsS===undefined)return null;
          if(slS===item.max&&rsS<item.max)return{...item,slScore:slS,rsScore:rsS,area:j.name};
          return null;
        })).filter(Boolean);
        if(blindSpots.length>0){
          const names=blindSpots.slice(0,3).map(q=>`«${q.t.split(" — ")[0]}» (SL: ${q.slScore}/5, RS: ${q.rsScore}/5)`);
          tips.push({type:"blindspot",icon:"🔍",text:`Blind spots — stasjonsleder scorer høyt, du scorer lavt:\n${names.join(". ")}${blindSpots.length>3?`. +${blindSpots.length-3} til.`:""}`});
        }

        // Shared problems: both scored below full
        const sharedLow=JOURNEY.flatMap(j=>j.items.map(item=>{
          const slS=lastSL.scores?.[String(item.id)];
          const rsS=lastRS.scores?.[String(item.id)];
          if(slS===undefined||rsS===undefined)return null;
          // Both scored less than max (Ikke godkjent or Delvis)
          if(slS<item.max&&rsS<item.max)return{...item,area:j.name};
          return null;
        })).filter(Boolean);
        if(sharedLow.length>0){
          tips.push({type:"shared",icon:"🤝",text:`Enige om utfordringer: ${sharedLow.slice(0,3).map(q=>q.t.split(" — ")[0]).join(", ")}. Begge ser problemet — bruk det som utgangspunkt for tiltak.`});
        }
      }

      // 3. Find worst individual questions
      const worstQ=JOURNEY.flatMap(j=>j.items.map(item=>{
        const s=lastSL.scores?.[String(item.id)];
        return s!==undefined?{...item,score:s,area:j.name}:null;
      })).filter(Boolean).sort((a,b)=>a.score-b.score);
      const fails=worstQ.filter(q=>q.score===0);
      if(fails.length>0){
        const names=fails.slice(0,3).map(q=>q.t.split(" — ")[0]);
        tips.push({type:"fails",icon:"📸",text:`${fails.length} punkt${fails.length>1?"er":""} fikk «Ikke godkjent»: ${names.join(", ")}${fails.length>3?` (+${fails.length-3} til)`:""}`});
      }

      // 4. Trend analysis if multiple visits
      if(slVisits.length>=2){
        const prev=slVisits[1];
        const diff=lastSL.pct-prev.pct;
        if(diff<-10)tips.push({type:"trend",icon:"📉",text:`Scoren har falt ${Math.abs(diff)}pp siden forrige besøk. Finn ut hva som har endret seg — ny ansatt? Endret rutine?`});
        else if(diff>10)tips.push({type:"trend",icon:"📈",text:`Sterk fremgang! +${diff}pp siden sist. Anerkjenn det som er blitt bedre — det forsterker atferden.`});
      }

      // 5. Suggested approach
      if(weakest.pct<60)tips.push({type:"approach",icon:"🎯",text:`Foreslått tilnærming: Start med å spørre stasjonsleder hva de selv tenker om ${weakest.name.toLowerCase()} før du deler din vurdering. La dem eie problemet.`});
      else tips.push({type:"approach",icon:"🎯",text:`Foreslått tilnærming: Anerkjenn det som fungerer bra, deretter fokuser samtalen på de 2-3 punktene med størst forbedringspotensial.`});

      return tips.length>0?tips:null;
    })();

    return(
      <div style={{paddingBottom:40}}>
        <div style={{background:D,padding:"14px 20px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>{setStationView(null);setView("home");}} style={{color:"#7799bb",fontSize:13,fontWeight:600}}>←</button>
            <img src={LW} alt="YX" style={{height:24}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#7799bb"}}>{profile?.name}</span>
            <button onClick={logout} aria-label="Logg ut" style={{fontSize:12,color:"#5577aa",fontWeight:600,padding:"6px 10px",minHeight:32}}>Logg ut</button>
          </div>
        </div>
        <div style={{padding:"16px 20px"}}>
          {/* Station info */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <div style={{fontSize:18,fontWeight:800,color:D}}>{sv.name}</div>
              <div style={{fontSize:12,color:"#777"}}>{sv.address}, {sv.postnr} {sv.poststed} · {sv.type==="automat"?"Automat":"Fullservice"}</div>
            </div>
            <button onClick={()=>{setScores({});setNa({});setNotes({});setPhotos({});setVisitNote("");setCatIdx(0);setIncludeHms(null);setStation(sv);setView("audit");}} style={{background:R,color:"#fff",padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:700}}>Nytt besøk</button>
          </div>

          {/* Score summary */}
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <div style={{flex:1,background:"#fff",borderRadius:12,border:"1px solid #eae7df",padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:800,color:lastSL?pCol(lastSL.pct):"#ccc"}}>{lastSL?lastSL.pct+"%":"—"}</div>
              <div style={{fontSize:10,color:"#888",marginTop:2}}>Stasjonens vurdering</div>
            </div>
            <div style={{flex:1,background:"#fff",borderRadius:12,border:"1px solid #eae7df",padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:800,color:lastRS?pCol(lastRS.pct):"#ccc"}}>{lastRS?lastRS.pct+"%":"—"}</div>
              <div style={{fontSize:10,color:"#888",marginTop:2}}>Regionssjefens score</div>
            </div>
            {lastRS&&lastSL&&(
              <div style={{flex:1,background:"#fff",borderRadius:12,border:"1px solid #eae7df",padding:"14px",textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:800,color:Math.abs(lastSL.pct-lastRS.pct)>15?"#dc2626":Math.abs(lastSL.pct-lastRS.pct)>5?"#d97706":"#16a34a"}}>{Math.abs(lastSL.pct-lastRS.pct)}pp</div>
                <div style={{fontSize:10,color:"#888",marginTop:2}}>Gap</div>
              </div>
            )}
          </div>

          {/* AI COACHING */}
          {coaching&&(isRS||isLeder)&&(
            <div style={{background:`linear-gradient(135deg, ${D}06, #7c3aed08)`,border:"1px solid #c4b5fd",borderRadius:14,padding:"16px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontSize:16}}>🤖</span>
                <span style={{fontSize:14,fontWeight:700,color:D}}>Coaching-briefing</span>
                <span style={{fontSize:9,fontWeight:600,color:"#7c3aed",background:"#ede9fe",padding:"2px 6px",borderRadius:4}}>AI</span>
              </div>
              <div style={{fontSize:11,color:"#777",marginBottom:10}}>
                {lastRS&&lastSL?"Basert på stasjonens selvevaluering og regionsjefens siste besøk":lastSL?"Basert på stasjonens selvevaluering ("+new Date(lastSL.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})+"). Regionssjef har ikke besøkt ennå.":"Ingen data tilgjengelig"}
              </div>
              {coaching.map((tip,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"8px 0",borderTop:i?"1px solid #e9e5f5":"none"}}>
                  <span style={{fontSize:14,flexShrink:0}}>{tip.icon}</span>
                  <div style={{fontSize:13,color:"#333",lineHeight:1.5}}>{tip.text}</div>
                </div>
              ))}
            </div>
          )}

          {/* Open actions for this station */}
          {(()=>{
            const stationActions=actions.filter(a=>a.station_id===sv.id);
            const openActions=stationActions.filter(a=>a.status==='open'||a.status==='in_progress');
            const doneActions=stationActions.filter(a=>a.status==='completed');
            return(
              <>
                {/* Unresolved items → quick-create actions */}
                {unresolved.length>0&&(
                  <div style={{marginBottom:20}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{fontSize:14,fontWeight:700,color:D}}>⚠️ Åpne punkter fra forrige besøk</div>
                      <div style={{fontSize:11,color:"#888"}}>{unresolved.length} punkt{unresolved.length>1?"er":""}</div>
                    </div>
                    {unresolved.map(item=>{
                      const existingAction=stationActions.find(a=>a.item_id===String(item.id)&&(a.status==='open'||a.status==='in_progress'));
                      return(
                        <div key={item.id} style={{background:"#fff",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",marginBottom:4}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                            <div style={{fontSize:13,color:D,flex:1}}>{item.t.includes(" — ")?<><span style={{fontWeight:700}}>{item.t.split(" — ")[0]}</span><span style={{fontWeight:400,color:"#555"}}> — {item.t.split(" — ").slice(1).join(" — ")}</span></>:<span style={{fontWeight:600}}>{item.t}</span>}</div>
                            <div style={{background:item.score===0?"#dc2626":"#d97706",color:"#fff",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:700,flexShrink:0}}>{item.score===0?"Ikke godkjent":"Delvis"}</div>
                          </div>
                          {item.note&&<div style={{fontSize:11,color:"#666",marginTop:4,fontStyle:"italic"}}>"{item.note}"</div>}
                          {existingAction?(
                            <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
                              <span style={{fontSize:11,color:"#059669",fontWeight:600}}>✓ Tiltak opprettet</span>
                              <button onClick={()=>completeAction(existingAction.id)} style={{fontSize:11,fontWeight:700,color:"#fff",background:"#16a34a",padding:"4px 10px",borderRadius:5}}>Lukk tiltak</button>
                            </div>
                          ):(
                            <button onClick={()=>{const t=item.t.split(" — ")[0];createAction(sv.id,item.id,t,item.score===0?'high':'medium');}} style={{marginTop:8,fontSize:11,fontWeight:700,color:R,background:"#fff",border:"1px solid "+R,padding:"5px 10px",borderRadius:6}}>+ Opprett tiltak</button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* All open actions */}
                {openActions.length>0&&(
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:8}}>📋 Åpne tiltak ({openActions.length})</div>
                    {openActions.map(a=>(
                      <div key={a.id} style={{background:"#fff",border:"1px solid #eae7df",borderRadius:10,padding:"10px 14px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,color:D}}>{a.description||a.title}</div>
                          <div style={{fontSize:11,color:"#888",marginTop:2}}>
                            Opprettet {new Date(a.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}
                            <span style={{marginLeft:8,padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:700,background:a.priority==='high'||a.priority==='critical'?"#fef2f2":a.priority==='medium'?"#fffbeb":"#f0fdf4",color:a.priority==='high'||a.priority==='critical'?"#991b1b":a.priority==='medium'?"#92400e":"#166534"}}>{a.priority==='critical'?'Kritisk':a.priority==='high'?'Høy':a.priority==='medium'?'Medium':'Lav'}</span>
                          </div>
                        </div>
                        <button onClick={()=>completeAction(a.id)} style={{fontSize:11,fontWeight:700,color:"#fff",background:"#16a34a",padding:"6px 12px",borderRadius:6,flexShrink:0}}>✓ Lukk</button>
                      </div>
                    ))}
                  </div>
                )}

                {doneActions.length>0&&(
                  <div style={{marginBottom:16,fontSize:11,color:"#16a34a"}}>✓ {doneActions.length} tiltak fullført</div>
                )}
              </>
            );
          })()}

          {/* Visit history */}
          <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:8}}>Tidligere besøk</div>
          {stVisits.length===0&&<div style={{color:"#888",fontSize:13}}>Ingen besøk registrert ennå</div>}
          {stVisits.map(v=>(
            <div key={v.id} style={{background:"#fff",border:"1px solid #eae7df",borderRadius:10,padding:"10px 14px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:D}}>
                  {v.visit_role==="rs"?"📋 Regionssjef":"🏪 Stasjonsleder"}
                </div>
                <div style={{fontSize:10,color:"#888"}}>{new Date(v.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
              </div>
              <button onClick={()=>generateReport(v,sv.name)} aria-label="Rapport" style={{fontSize:11,color:"#555",background:"#f5f3ee",padding:"4px 8px",borderRadius:5,fontWeight:600}}>📄</button>
              <div style={{background:pCol(v.pct),color:"#fff",padding:"3px 8px",borderRadius:6,fontSize:12,fontWeight:700}}>{v.pct}%</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ── DASHBOARD ── */
  if(view==="dash"){
    const scopedStations=isRS&&profile?.region_id?stations.filter(s=>s.region_id===profile.region_id):stations;
    const scopedIds=new Set(scopedStations.map(s=>s.id));
    const rsV=visits.filter(v=>v.visit_role==="rs"&&scopedIds.has(v.station_id));
    const slV=visits.filter(v=>v.visit_role==="sl"&&scopedIds.has(v.station_id));
    const stScores=scopedStations.map(s=>{
      const lastRS=rsV.find(v=>v.station_id===s.id);
      const lastSL=slV.find(v=>v.station_id===s.id);
      const gap=lastRS&&lastSL?lastSL.pct-lastRS.pct:null;
      return{...s,lastRS,lastSL,gap};
    }).filter(s=>s.lastRS||s.lastSL).sort((a,b)=>(a.lastRS?.pct??a.lastSL?.pct??100)-(b.lastRS?.pct??b.lastSL?.pct??100));
    const avgRS=rsV.length?Math.round(rsV.reduce((s,v)=>s+v.pct,0)/rsV.length):0;
    const avgSL=slV.length?Math.round(slV.reduce((s,v)=>s+v.pct,0)/slV.length):0;
    const visited=new Set(rsV.concat(slV).map(v=>v.station_id)).size;

    return(
      <div style={{paddingBottom:40}}>
        <div style={{background:D,padding:"14px 20px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setView("home")} style={{color:"#7799bb",fontSize:13,fontWeight:600}}>←</button>
            <img src={LW} alt="YX" style={{height:24}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#7799bb"}}>{profile?.name}</span>
            <button onClick={logout} aria-label="Logg ut" style={{fontSize:12,color:"#5577aa",fontWeight:600,padding:"6px 10px",minHeight:32}}>Logg ut</button>
          </div>
        </div>

        <div style={{padding:"16px 20px"}}>
          {/* KPI row */}
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {[[rsV.length,"RS-besøk",R],[avgRS+"%","RS-snitt",pCol(avgRS)],[visited+"/"+scopedStations.length,"Stasjoner",B],[avgSL?avgSL+"%":"—","SL-snitt","#0369a1"]].map(([v,l,c],i)=>(
              <div key={i} style={{flex:1,background:"#fff",borderRadius:12,border:"1px solid #eae7df",padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>

          {/* Top 3 / Bottom 3 */}
          {stScores.length>=3&&(<>
            <div style={{display:"flex",gap:12,marginBottom:20}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#16a34a",marginBottom:8}}>🏆 Topp 3</div>
                {[...stScores].sort((a,b)=>(b.lastSL?.pct??0)-(a.lastSL?.pct??0)).slice(0,3).map((s,i)=>(
                  <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{width:"100%",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 12px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:14,fontWeight:800,color:"#16a34a"}}>{i+1}.</span>
                      <span style={{fontSize:12,fontWeight:600,color:D,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:800,color:"#16a34a"}}>{s.lastSL?.pct}%</span>
                  </button>
                ))}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:8}}>⚠️ Trenger oppfølging</div>
                {[...stScores].sort((a,b)=>(a.lastSL?.pct??100)-(b.lastSL?.pct??100)).slice(0,3).map((s,i)=>(
                  <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{width:"100%",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 12px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:14,fontWeight:800,color:"#dc2626"}}>{i+1}.</span>
                      <span style={{fontSize:12,fontWeight:600,color:D,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:800,color:"#dc2626"}}>{s.lastSL?.pct}%</span>
                  </button>
                ))}
              </div>
            </div>
          </>)}

          {/* Score per area */}
          {(()=>{
            const allV=slV.filter(v=>v.scores&&Object.keys(v.scores).length>0);
            if(!allV.length)return null;
            const areas=JOURNEY.map(j=>{
              let tot=0,max=0;
              allV.forEach(v=>{j.items.forEach(item=>{const s=v.scores?.[String(item.id)];if(s!==undefined&&!v.na_items?.includes(String(item.id))){tot+=s;max+=item.max;}});});
              return{name:j.name,icon:j.icon,pct:max>0?Math.round(tot/max*100):0};
            });
            return(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:10}}>Score per område (snitt alle stasjoner)</div>
                {areas.map(a=>(
                  <div key={a.name} style={{background:"#fff",border:"1px solid #eae7df",borderRadius:10,padding:"12px 14px",marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:D}}>{a.icon} {a.name}</span>
                      <span style={{fontSize:14,fontWeight:800,color:pCol(a.pct)}}>{a.pct}%</span>
                    </div>
                    <div style={{height:6,background:"#f0ede5",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",background:pCol(a.pct),width:a.pct+"%",borderRadius:3,transition:"width .3s"}}/>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Score per question */}
          {(()=>{
            const allV=slV.filter(v=>v.scores&&Object.keys(v.scores).length>0);
            if(!allV.length)return null;
            const qScores=JOURNEY.flatMap(j=>j.items.map(item=>{
              let tot=0,cnt=0;
              allV.forEach(v=>{const s=v.scores?.[String(item.id)];if(s!==undefined&&!v.na_items?.includes(String(item.id))){tot+=s;cnt++;}});
              const avg=cnt>0?Math.round(tot/cnt*10)/10:null;
              const pct=cnt>0?Math.round(tot/(cnt*item.max)*100):null;
              return{...item,avg,pct,cnt,area:j.icon,areaName:j.name};
            })).filter(q=>q.pct!==null).sort((a,b)=>a.pct-b.pct);
            return(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:4}}>Score per spørsmål (lavest først)</div>
                <div style={{fontSize:11,color:"#888",marginBottom:10}}>Viser hvor vi har mest å gå på</div>
                {qScores.map(q=>{
                  const parts=q.t.split(" — ");
                  return(
                  <div key={q.id} style={{background:"#fff",border:"1px solid #eae7df",borderRadius:10,padding:"10px 14px",marginBottom:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:12,fontWeight:700,color:D}}>{parts[0]}</span>
                        <span style={{fontSize:10,color:"#888"}}> ({q.areaName})</span>
                        {parts[1]&&<span style={{fontSize:11,color:"#777"}}> — {parts[1]}</span>}
                      </div>
                      <div style={{flexShrink:0,textAlign:"right"}}>
                        <div style={{fontSize:13,fontWeight:800,color:pCol(q.pct)}}>{q.pct}%</div>
                        <div style={{fontSize:9,color:"#888"}}>{q.avg}/{q.id<=20?5:q.max}</div>
                      </div>
                    </div>
                    <div style={{height:4,background:"#f0ede5",borderRadius:2,marginTop:6,overflow:"hidden"}}>
                      <div style={{height:"100%",background:pCol(q.pct),width:q.pct+"%",borderRadius:2}}/>
                    </div>
                  </div>
                );})}
              </div>
            );
          })()}

          {/* Gap analysis */}
          {stScores.filter(s=>s.gap!==null).length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:10}}>Gap-analyse (SL − RS)</div>
              {stScores.filter(s=>s.gap!==null).sort((a,b)=>Math.abs(b.gap)-Math.abs(a.gap)).slice(0,10).map(s=>(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #f5f3ee"}}>
                  <div style={{flex:1,fontSize:13,fontWeight:600,color:D,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                  <div style={{fontSize:11,color:"#0369a1",fontWeight:600}}>SL {s.lastSL.pct}%</div>
                  <div style={{fontSize:11,color:R,fontWeight:600}}>RS {s.lastRS.pct}%</div>
                  <div style={{padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:700,background:Math.abs(s.gap)>15?"#fef2f2":Math.abs(s.gap)>5?"#fffbeb":"#f0fdf4",color:Math.abs(s.gap)>15?"#991b1b":Math.abs(s.gap)>5?"#92400e":"#166534"}}>{s.gap>0?"+":""}{s.gap}pp</div>
                </div>
              ))}
            </div>
          )}

          {/* Stations ranked */}
          <div style={{fontSize:14,fontWeight:700,color:D,marginBottom:10}}>Stasjoner etter score</div>
          {stScores.map(s=>(
            <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{width:"100%",background:"#fff",border:"1px solid #eae7df",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:D,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                <div style={{fontSize:10,color:"#888"}}>{s.lastRS?new Date(s.lastRS.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}):"Ikke besøkt"}</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                {s.lastSL&&<div style={{background:"#dbeafe",color:"#1e40af",padding:"3px 7px",borderRadius:6,fontSize:10,fontWeight:700}}>SL {s.lastSL.pct}%</div>}
                {s.lastRS&&<div style={{background:pCol(s.lastRS.pct),color:"#fff",padding:"3px 7px",borderRadius:6,fontSize:10,fontWeight:700}}>RS {s.lastRS.pct}%</div>}
              </div>
            </button>
          ))}

          {stScores.length===0&&<div style={{textAlign:"center",padding:40,color:"#888"}}>Ingen besøk registrert ennå</div>}
        </div>
      </div>
    );
  }

  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
