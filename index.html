/* ── Trafficlight helper ── */
const trafficLight=(checks)=>{
  if(!checks||checks.length===0)return"unknown";
  const bad=checks.filter(c=>c.status==="ikke_ok").length;
  if(bad>=3)return"red";
  if(bad>=1)return"yellow";
  return"green";
};
const statusDot=(s)=>{
  const colors={green:C.ok,yellow:C.warn,red:C.bad,unknown:C.faint};
  return <span style={{width:10,height:10,borderRadius:"50%",background:colors[s]||C.faint,display:"inline-block"}}/>;
};

/* ── Photo upload helper ── */
async function uploadPhoto(file,userId){
  const ext=file.name?.split('.').pop()||'jpg';
  const path=`${userId}/${Date.now()}-${Math.random().toString(36).slice(2,9)}.${ext}`;
  const{error}=await sb.storage.from('visit-photos').upload(path,file,{contentType:file.type||'image/jpeg',upsert:false});
  if(error)throw error;
  const{data:urlData}=sb.storage.from('visit-photos').getPublicUrl(path);
  return urlData.publicUrl;
}

/* ── Checkpoint Item (OK / Ikke OK / NA) ── */
function CheckpointItem({cp,value,onChange,comment,onComment,photoUrl,onPhoto,userId}){
  const[showComment,setShowComment]=useState(!!comment);
  const[uploading,setUploading]=useState(false);
  const fileRef=useRef();

  const handlePhoto=async(e)=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setUploading(true);
    try{
      const url=await uploadPhoto(f,userId);
      onPhoto(url);
    }catch(err){console.error(err);}
    setUploading(false);
  };

  const btnStyle=(status,isActive)=>({
    flex:1,padding:"12px 8px",borderRadius:10,fontWeight:600,fontSize:13,
    border:`2px solid ${isActive?(status==="ok"?C.ok:status==="ikke_ok"?C.bad:C.muted):C.line}`,
    background:isActive?(status==="ok"?C.okSoft:status==="ikke_ok"?C.badSoft:C.subtle):C.surface,
    color:isActive?(status==="ok"?C.ok:status==="ikke_ok"?C.bad:C.muted):C.muted,
    transition:"all .15s",
  });

  return(
    <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.line}`,background:C.surface}}>
      <div style={{fontSize:14,fontWeight:600,color:C.ink,marginBottom:4}}>{cp.label}</div>
      {cp.critical&&<div style={{fontSize:11,color:C.bad,fontWeight:600,marginBottom:6}}>⚠ Kritisk punkt</div>}
      <div style={{fontSize:12,color:C.muted,fontStyle:"italic",marginBottom:12}}>💬 {cp.q}</div>
      
      {/* OK / Ikke OK / NA buttons */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <button style={btnStyle("ok",value==="ok")} onClick={()=>onChange("ok")}>
          👍 OK
        </button>
        <button style={btnStyle("ikke_ok",value==="ikke_ok")} onClick={()=>onChange("ikke_ok")}>
          👎 Ikke OK
        </button>
        <button style={btnStyle("na",value==="na")} onClick={()=>onChange("na")}>
          — N/A
        </button>
      </div>

      {/* Photo required/optional for Ikke OK */}
      {value==="ikke_ok"&&(
        <div style={{marginTop:8}}>
          <input type="file" ref={fileRef} accept="image/*" capture="environment" onChange={handlePhoto}/>
          <button onClick={()=>fileRef.current?.click()}
            style={{padding:"8px 16px",borderRadius:8,background:cp.photoRequired?C.badSoft:C.subtle,
              color:cp.photoRequired?C.bad:C.muted,fontSize:12,fontWeight:600,
              border:`1px solid ${cp.photoRequired?C.bad:C.line}`}}>
            {uploading?"Laster opp...":photoUrl?"📷 Bilde tatt":"📷 "+(cp.photoRequired?"Ta bilde (obligatorisk)":"Ta bilde")}
          </button>
          {photoUrl&&<img src={photoUrl} style={{width:80,height:80,objectFit:"cover",borderRadius:8,marginLeft:8,verticalAlign:"middle"}} alt="Avvik"/>}
        </div>
      )}

      {/* Comment toggle */}
      {!showComment&&(
        <button onClick={()=>setShowComment(true)} style={{fontSize:12,color:C.muted,marginTop:8,textDecoration:"underline"}}>
          + Legg til kommentar
        </button>
      )}
      {showComment&&(
        <textarea value={comment||""} onChange={e=>onComment(e.target.value)}
          placeholder="Kommentar..."
          style={{width:"100%",marginTop:8,padding:10,border:`1px solid ${C.line}`,borderRadius:8,fontSize:13,minHeight:60,background:C.subtle}}/>
      )}
    </div>
  );
}

/* ── Visit Summary / Takk for besøket ── */
function VisitSummary({checks,areaStatuses,onSend,strengthsNote,setStrengthsNote,conversationNote,setConversationNote,sending}){
  const totalAvvik=Object.values(checks).filter(c=>c.status==="ikke_ok").length;
  
  return(
    <div style={{padding:20}}>
      <h2 style={{fontSize:20,marginBottom:16}}>Oppsummering</h2>
      
      {/* Traffic lights per area */}
      <div style={{display:"flex",gap:12,marginBottom:24}}>
        {VISIT_AREAS.map(a=>{
          const s=areaStatuses[a.key];
          const colors={green:C.ok,yellow:C.warn,red:C.bad};
          const labels={green:"OK",yellow:"Avvik",red:"Kritisk"};
          return(
            <div key={a.key} style={{flex:1,padding:16,borderRadius:12,background:s==="green"?C.okSoft:s==="yellow"?C.warnSoft:C.badSoft,textAlign:"center"}}>
              <div style={{fontSize:24}}>{a.icon}</div>
              <div style={{fontSize:12,fontWeight:600,color:colors[s]||C.muted,marginTop:4}}>{labels[s]||"—"}</div>
              <div style={{fontSize:11,color:C.muted}}>{a.name}</div>
            </div>
          );
        })}
      </div>

      {totalAvvik>0&&(
        <div style={{padding:12,background:C.badSoft,borderRadius:10,marginBottom:16,fontSize:13,color:C.bad}}>
          <strong>{totalAvvik} avvik</strong> registrert i dette besøket.
        </div>
      )}

      {/* Strengths first (obligatorisk) */}
      <div style={{marginBottom:16}}>
        <label style={{fontSize:13,fontWeight:600,color:C.ink,display:"block",marginBottom:6}}>
          ✨ Hva fungerer godt på denne stasjonen? <span style={{color:C.bad}}>*</span>
        </label>
        <textarea value={strengthsNote} onChange={e=>setStrengthsNote(e.target.value)}
          placeholder="Start med det positive — hva gjør de bra?"
          style={{width:"100%",padding:12,border:`1px solid ${C.line}`,borderRadius:10,fontSize:14,minHeight:80,background:C.subtle}}/>
      </div>

      {/* Conversation summary */}
      <div style={{marginBottom:16}}>
        <label style={{fontSize:13,fontWeight:600,color:C.ink,display:"block",marginBottom:6}}>
          💬 Hva ble dere enige om?
        </label>
        <textarea value={conversationNote} onChange={e=>setConversationNote(e.target.value)}
          placeholder="Formuler i SL sin stemme: 'Du sa du vil prøve...'"
          style={{width:"100%",padding:12,border:`1px solid ${C.line}`,borderRadius:10,fontSize:14,minHeight:80,background:C.subtle}}/>
      </div>

      {/* Send button */}
      <button onClick={onSend} disabled={!strengthsNote.trim()||sending}
        style={{width:"100%",padding:16,background:strengthsNote.trim()?C.ok:"#ccc",color:"#fff",borderRadius:12,fontWeight:700,fontSize:16,opacity:sending?.6:1}}>
        {sending?"Lagrer...":"✅ Fullfør besøk og send \"Takk for besøket\""}
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════ */
function App(){
  const[loading,setLoading]=useState(true);
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[tab,setTab]=useState("forside");
  
  // Data
  const[stations,setStations]=useState([]);
  const[visits,setVisits]=useState([]);
  const[kubaStatuses,setKubaStatuses]=useState([]);
  const[campaigns,setCampaigns]=useState([]);
  const[salesData,setSalesData]=useState([]);
  
  // Login
  const[loginEmail,setLoginEmail]=useState("");
  const[loginPw,setLoginPw]=useState("");
  const[loginErr,setLoginErr]=useState("");
  const[loginLoad,setLoginLoad]=useState(false);
  
  // Visit state
  const[selectedStation,setSelectedStation]=useState(null);
  const[visitView,setVisitView]=useState("select"); // select | visit | kuba | summary | done
  const[activeArea,setActiveArea]=useState(0);
  const[checks,setChecks]=useState({}); // {checkpointKey: {status,comment,photoUrl}}
  const[kubaCheck,setKubaCheck]=useState({status:"unknown",ikmat:"unknown",comment:""});
  const[strengthsNote,setStrengthsNote]=useState("");
  const[conversationNote,setConversationNote]=useState("");
  const[privateNote,setPrivateNote]=useState("");
  const[saving,setSaving]=useState(false);
  
  // Search
  const[search,setSearch]=useState("");

  // Auth
  const loadProfile=async(uid)=>{
    const{data}=await sb.from("profiles").select("*").eq("id",uid).single();
    if(data){setProfile(data);loadData(data);}
    setLoading(false);
  };

  const loadData=async(prof)=>{
    // Load stations based on role
    let stQ=sb.from("stations").select("*").order("name");
    if(prof.role==="regionssjef"&&prof.region_id)stQ=stQ.eq("region_id",prof.region_id);
    if(prof.role==="stasjonsleder"&&prof.station_id)stQ=stQ.eq("id",prof.station_id);
    const{data:st}=await stQ;
    if(st)setStations(st);

    // Load recent visits
    const{data:v}=await sb.from("visits").select("*").order("created_at",{ascending:false}).limit(200);
    if(v)setVisits(v);

    // Load KUBA statuses
    const{data:k}=await sb.from("kuba_status").select("*").order("registered_at",{ascending:false});
    if(k)setKubaStatuses(k);

    // Load campaigns
    const{data:c}=await sb.from("campaigns").select("*").eq("active",true);
    if(c)setCampaigns(c);

    // Load sales data
    const{data:s}=await sb.from("sales_snapshot").select("*");
    if(s)setSalesData(s);
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadProfile(session.user.id);}
      else setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{
      if(s){setUser(s.user);loadProfile(s.user.id);}
      else{setUser(null);setProfile(null);setLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const login=async()=>{
    setLoginErr("");setLoginLoad(true);
    const{error}=await sb.auth.signInWithPassword({email:loginEmail,password:loginPw});
    if(error)setLoginErr("Feil e-post eller passord");
    setLoginLoad(false);
  };

  const logout=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);};

  // Visit helpers
  const updateCheck=(key,field,value)=>{
    setChecks(prev=>({...prev,[key]:{...prev[key],[field]:value}}));
  };

  const areaStatuses=useMemo(()=>{
    const result={};
    VISIT_AREAS.forEach(a=>{
      const areaChecks=a.checkpoints.map(cp=>checks[cp.key]).filter(Boolean);
      result[a.key]=trafficLight(areaChecks);
    });
    return result;
  },[checks]);

  const startVisit=(station)=>{
    setSelectedStation(station);
    setVisitView("visit");
    setActiveArea(0);
    setChecks({});
    setKubaCheck({status:"unknown",ikmat:"unknown",comment:""});
    setStrengthsNote("");
    setConversationNote("");
    setPrivateNote("");
    setTab("besok");
  };

  const saveVisit=async()=>{
    if(!selectedStation||!user)return;
    setSaving(true);
    try{
      // 1. Create visit
      const{data:visit,error:vErr}=await sb.from("visits").insert({
        station_id:selectedStation.id,
        user_id:user.id,
        visit_role:"rs",
        status:"completed",
        visit_type:"coaching",
        area_rent_status:areaStatuses.rent,
        area_varer_status:areaStatuses.varer,
        area_folk_status:areaStatuses.folk,
        strengths_note:strengthsNote,
        private_note:privateNote,
        completed_at:new Date().toISOString(),
        scores:{},na_items:[],notes:{},
        total_score:0,max_score:0,pct:0,photo_count:0,
      }).select().single();

      if(vErr)throw vErr;

      // 2. Save visit checks
      const checkRows=[];
      VISIT_AREAS.forEach((area,aIdx)=>{
        area.checkpoints.forEach((cp,cIdx)=>{
          const c=checks[cp.key];
          if(c&&c.status){
            checkRows.push({
              visit_id:visit.id,
              area:area.key,
              checkpoint_key:cp.key,
              checkpoint_label:cp.label,
              status:c.status,
              comment:c.comment||null,
              photo_url:c.photoUrl||null,
              sort_order:aIdx*100+cIdx,
            });
          }
        });
      });
      if(checkRows.length>0){
        await sb.from("visit_checks").insert(checkRows);
      }

      // 3. Save KUBA status
      await sb.from("kuba_status").insert({
        station_id:selectedStation.id,
        status:kubaCheck.status,
        ikmat_status:kubaCheck.ikmat,
        comment:kubaCheck.comment||null,
        registered_by:user.id,
      });

      // 4. Save "Takk for besøket" message
      const avvikList=VISIT_AREAS.flatMap(a=>
        a.checkpoints.filter(cp=>checks[cp.key]?.status==="ikke_ok")
          .map(cp=>cp.label)
      );
      const fullMsg=`Hei ${selectedStation.forhandler||""}!\n\nTakk for besøket i dag.\n\n✨ Det som fungerer godt:\n${strengthsNote}\n\n${conversationNote?`💬 Det vi ble enige om:\n${conversationNote}\n\n`:""}${avvikList.length>0?`📋 Punkter å følge opp (${avvikList.length}):\n${avvikList.map(a=>`• ${a}`).join("\n")}\n\n`:""}Si fra om du trenger noe — vi er her for å hjelpe! 🫡`;

      await sb.from("visit_messages").insert({
        visit_id:visit.id,
        strengths_text:strengthsNote,
        conversation_summary:conversationNote||null,
        action_items_text:avvikList.length>0?avvikList.join("\n"):null,
        full_message:fullMsg,
      });

      // 5. Create actions for each avvik
      const avvikActions=VISIT_AREAS.flatMap(a=>
        a.checkpoints.filter(cp=>checks[cp.key]?.status==="ikke_ok")
          .map(cp=>({
            visit_id:visit.id,
            station_id:selectedStation.id,
            item_id:0,
            description:cp.label,
            assigned_to:"stasjon",
            priority:cp.critical?"high":"medium",
            status:"open",
            area:a.key,
            checkpoint_key:cp.key,
            photo_url:checks[cp.key]?.photoUrl||null,
            created_by:user.id,
          }))
      );
      if(avvikActions.length>0){
        await sb.from("actions").insert(avvikActions);
      }

      setVisitView("done");
      loadData(profile); // Refresh data
    }catch(e){
      console.error("Save failed:",e);
      alert("Kunne ikke lagre besøket. Prøv igjen.");
    }
    setSaving(false);
  };

  // ── Loading
  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:C.navy}}>
      <div style={{color:"#fff",fontSize:14}}>Laster...</div>
    </div>
  );

  // ── Login
  if(!user||!profile)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:`linear-gradient(170deg, ${C.navy} 0%, #162d4a 100%)`,padding:32}}>
      <span style={{fontSize:42,fontWeight:900,letterSpacing:4,color:"#fff",marginBottom:8}}>YX</span>
      <div style={{color:C.red,fontSize:13,fontWeight:800,letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>Klar for Kunde</div>
      <div style={{color:"#5577aa",fontSize:12,marginBottom:48}}>Coaching — Kampanjer — Innsikt</div>
      <div style={{width:"100%",maxWidth:340}}>
        <input type="email" placeholder="E-post" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} autoComplete="email"
          style={{width:"100%",padding:"15px 18px",borderRadius:12,background:"rgba(255,255,255,.08)",color:"#fff",border:"1px solid rgba(255,255,255,.15)",marginBottom:10,fontSize:16,backdropFilter:"blur(10px)"}}/>
        <input type="password" placeholder="Passord" value={loginPw} onChange={e=>setLoginPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} autoComplete="current-password"
          style={{width:"100%",padding:"15px 18px",borderRadius:12,background:"rgba(255,255,255,.08)",color:"#fff",border:"1px solid rgba(255,255,255,.15)",marginBottom:18,fontSize:16,backdropFilter:"blur(10px)"}}/>
        {loginErr&&<div style={{color:"#f87171",fontSize:13,marginBottom:10,textAlign:"center"}}>{loginErr}</div>}
        <button onClick={login} disabled={loginLoad} style={{width:"100%",padding:"16px",background:C.red,color:"#fff",borderRadius:12,fontWeight:800,fontSize:16,opacity:loginLoad?.6:1,letterSpacing:.5}}>{loginLoad?"Logger inn...":"Logg inn"}</button>
      </div>
    </div>
  );

  // ── Filtered stations
  const filteredStations=stations.filter(s=>
    !search||s.name.toLowerCase().includes(search.toLowerCase())||
    (s.forhandler||"").toLowerCase().includes(search.toLowerCase())
  );

  // Helper: get last visit for a station
  const getLastVisit=(stId)=>visits.find(v=>v.station_id===stId);
  const getKubaStatus=(stId)=>kubaStatuses.find(k=>k.station_id===stId);
  const getSales=(stId)=>salesData.find(s=>s.station_id===stId);

  /* ══════════ RENDER ══════════ */
  return(
    <div style={{paddingBottom:70}}>
      <AppHeader title="Klar for Kunde" onLogout={logout} profile={profile}/>

      {/* ── FORSIDE TAB ── */}
      {tab==="forside"&&(
        <div>
          <div style={{padding:"16px 20px 8px"}}>
            <h2 style={{fontSize:18,marginBottom:12}}>Mine stasjoner</h2>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søk stasjon..."
              style={{width:"100%",padding:"12px 16px",borderRadius:10,border:`1px solid ${C.line}`,background:C.subtle,fontSize:14,marginBottom:8}}/>
            <div style={{fontSize:12,color:C.muted}}>{filteredStations.length} stasjoner</div>
          </div>
          {filteredStations.map(s=>(
            <StationCard key={s.id} station={s} 
              lastVisit={getLastVisit(s.id)} 
              kubaStatus={getKubaStatus(s.id)}
              onClick={()=>startVisit(s)}/>
          ))}
        </div>
      )}

      {/* ── BESØKET TAB ── */}
      {tab==="besok"&&(
        <div>
          {visitView==="select"&&(
            <div style={{padding:20,textAlign:"center",color:C.muted}}>
              <p style={{marginTop:40}}>Velg en stasjon fra Forsiden for å starte et besøk.</p>
            </div>
          )}

          {visitView==="visit"&&selectedStation&&(
            <div>
              {/* Station header */}
              <div style={{padding:"16px 20px",background:C.subtle,borderBottom:`1px solid ${C.line}`}}>
                <div style={{fontSize:16,fontWeight:700}}>{selectedStation.name}</div>
                <div style={{fontSize:12,color:C.muted}}>{selectedStation.forhandler||""} — {selectedStation.address||""}</div>
              </div>

              {/* Area tabs */}
              <div style={{display:"flex",borderBottom:`1px solid ${C.line}`}}>
                {VISIT_AREAS.map((a,i)=>{
                  const isActive=activeArea===i;
                  const aChecks=a.checkpoints.map(cp=>checks[cp.key]).filter(Boolean);
                  const done=aChecks.length===a.checkpoints.length;
                  return(
                    <button key={a.key} onClick={()=>setActiveArea(i)}
                      style={{flex:1,padding:"12px 4px",textAlign:"center",
                        borderBottom:isActive?`3px solid ${C.red}`:"3px solid transparent",
                        background:isActive?C.surface:C.subtle,transition:"all .2s"}}>
                      <div style={{fontSize:18}}>{a.icon}</div>
                      <div style={{fontSize:10,fontWeight:isActive?700:500,color:isActive?C.ink:C.muted,marginTop:2}}>
                        {a.name}
                        {done&&" ✓"}
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* Area description */}
              <div style={{padding:"12px 20px",background:C.subtle,fontSize:13,color:C.body}}>
                {VISIT_AREAS[activeArea].desc}
              </div>

              {/* Checkpoints */}
              {VISIT_AREAS[activeArea].checkpoints.map(cp=>(
                <CheckpointItem key={cp.key} cp={cp}
                  value={checks[cp.key]?.status}
                  onChange={v=>updateCheck(cp.key,"status",v)}
                  comment={checks[cp.key]?.comment}
                  onComment={v=>updateCheck(cp.key,"comment",v)}
                  photoUrl={checks[cp.key]?.photoUrl}
                  onPhoto={v=>updateCheck(cp.key,"photoUrl",v)}
                  userId={user.id}/>
              ))}

              {/* Navigation buttons */}
              <div style={{padding:20,display:"flex",gap:12}}>
                {activeArea>0&&(
                  <button onClick={()=>setActiveArea(a=>a-1)}
                    style={{flex:1,padding:14,borderRadius:10,border:`1px solid ${C.line}`,fontWeight:600,fontSize:14,color:C.muted}}>
                    ← Forrige
                  </button>
                )}
                {activeArea<VISIT_AREAS.length-1?(
                  <button onClick={()=>setActiveArea(a=>a+1)}
                    style={{flex:1,padding:14,borderRadius:10,background:C.red,color:"#fff",fontWeight:600,fontSize:14}}>
                    Neste →
                  </button>
                ):(
                  <button onClick={()=>setVisitView("kuba")}
                    style={{flex:1,padding:14,borderRadius:10,background:C.red,color:"#fff",fontWeight:600,fontSize:14}}>
                    KUBA-status →
                  </button>
                )}
              </div>
            </div>
          )}

          {/* KUBA Status check */}
          {visitView==="kuba"&&selectedStation&&(
            <div style={{padding:20}}>
              <h2 style={{fontSize:18,marginBottom:16}}>Status fra KUBA</h2>
              <p style={{fontSize:13,color:C.body,marginBottom:20}}>
                Registrer HMS-status og IK-mat-status for {selectedStation.name}. Disse vises som trafikklys i oversikten.
              </p>

              {/* HMS status */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>HMS-aktiviteter i KUBA</div>
                <div style={{display:"flex",gap:8}}>
                  {["green","yellow","red"].map(s=>{
                    const labels={green:"OK",yellow:"Delvis",red:"Ikke utført"};
                    const colors={green:C.ok,yellow:C.warn,red:C.bad};
                    const bgs={green:C.okSoft,yellow:C.warnSoft,red:C.badSoft};
                    const active=kubaCheck.status===s;
                    return(
                      <button key={s} onClick={()=>setKubaCheck(p=>({...p,status:s}))}
                        style={{flex:1,padding:14,borderRadius:10,fontWeight:600,fontSize:13,
                          border:`2px solid ${active?colors[s]:C.line}`,
                          background:active?bgs[s]:C.surface,
                          color:active?colors[s]:C.muted}}>
                        {statusDot(s)} {labels[s]}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* IK-mat status */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>IK-mat status</div>
                <div style={{display:"flex",gap:8}}>
                  {["green","yellow","red"].map(s=>{
                    const labels={green:"OK",yellow:"Delvis",red:"Ikke utført"};
                    const colors={green:C.ok,yellow:C.warn,red:C.bad};
                    const bgs={green:C.okSoft,yellow:C.warnSoft,red:C.badSoft};
                    const active=kubaCheck.ikmat===s;
                    return(
                      <button key={s} onClick={()=>setKubaCheck(p=>({...p,ikmat:s}))}
                        style={{flex:1,padding:14,borderRadius:10,fontWeight:600,fontSize:13,
                          border:`2px solid ${active?colors[s]:C.line}`,
                          background:active?bgs[s]:C.surface,
                          color:active?colors[s]:C.muted}}>
                        {statusDot(s)} {labels[s]}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Comment */}
              <textarea value={kubaCheck.comment} onChange={e=>setKubaCheck(p=>({...p,comment:e.target.value}))}
                placeholder="Kommentar til KUBA-status..."
                style={{width:"100%",padding:12,border:`1px solid ${C.line}`,borderRadius:10,fontSize:13,minHeight:60,background:C.subtle,marginBottom:20}}/>

              {/* Coaching: if not green */}
              {(kubaCheck.status!=="green"||kubaCheck.ikmat!=="green")&&kubaCheck.status!=="unknown"&&(
                <div style={{padding:12,background:C.warnSoft,borderRadius:10,marginBottom:20,fontSize:13,color:C.warn}}>
                  💡 <strong>Coaching-tip:</strong> Spør SL: "Hvordan kan vi hjelpe deg å komme i gang med KUBA?"
                </div>
              )}

              <div style={{display:"flex",gap:12}}>
                <button onClick={()=>{setVisitView("visit");setActiveArea(VISIT_AREAS.length-1);}}
                  style={{flex:1,padding:14,borderRadius:10,border:`1px solid ${C.line}`,fontWeight:600,fontSize:14,color:C.muted}}>
                  ← Tilbake
                </button>
                <button onClick={()=>setVisitView("summary")}
                  style={{flex:1,padding:14,borderRadius:10,background:C.red,color:"#fff",fontWeight:600,fontSize:14}}>
                  Oppsummering →
                </button>
              </div>
            </div>
          )}

          {/* Summary / Takk for besøket */}
          {visitView==="summary"&&selectedStation&&(
            <div>
              <div style={{padding:"16px 20px",background:C.subtle,borderBottom:`1px solid ${C.line}`}}>
                <div style={{fontSize:16,fontWeight:700}}>{selectedStation.name}</div>
                <div style={{fontSize:12,color:C.muted}}>Oppsummering av besøk</div>
              </div>
              
              {/* Private note for RS only */}
              <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.line}`}}>
                <label style={{fontSize:13,fontWeight:600,color:C.ink,display:"block",marginBottom:6}}>
                  🔒 Mine notater (kun for deg)
                </label>
                <textarea value={privateNote} onChange={e=>setPrivateNote(e.target.value)}
                  placeholder="Private refleksjoner..."
                  style={{width:"100%",padding:12,border:`1px solid ${C.line}`,borderRadius:10,fontSize:13,minHeight:60,background:C.subtle}}/>
              </div>

              <VisitSummary checks={checks} areaStatuses={areaStatuses}
                onSend={saveVisit}
                strengthsNote={strengthsNote} setStrengthsNote={setStrengthsNote}
                conversationNote={conversationNote} setConversationNote={setConversationNote}
                sending={saving}/>

              <div style={{padding:"0 20px 20px"}}>
                <button onClick={()=>setVisitView("kuba")}
                  style={{width:"100%",padding:14,borderRadius:10,border:`1px solid ${C.line}`,fontWeight:600,fontSize:14,color:C.muted}}>
                  ← Tilbake til KUBA-status
                </button>
              </div>
            </div>
          )}

          {/* Done! */}
          {visitView==="done"&&(
            <div style={{padding:40,textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:16}}>🎉</div>
              <h2 style={{fontSize:20,marginBottom:8}}>Besøket er lagret!</h2>
              <p style={{color:C.muted,fontSize:14,marginBottom:24}}>
                "Takk for besøket"-melding er opprettet for {selectedStation?.name}.
              </p>
              <button onClick={()=>{setVisitView("select");setSelectedStation(null);setTab("forside");}}
                style={{padding:"14px 32px",background:C.red,color:"#fff",borderRadius:12,fontWeight:700,fontSize:15}}>
                Tilbake til forsiden
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── KAMPANJER TAB ── */}
      {tab==="kampanjer"&&(
        <div style={{padding:20}}>
          <h2 style={{fontSize:18,marginBottom:16}}>Kampanjer</h2>
          {campaigns.length===0&&<p style={{color:C.muted}}>Ingen aktive kampanjer.</p>}
          {campaigns.map(c=>{
            let items=[];
            try{items=typeof c.items==='string'?JSON.parse(c.items):(c.items||[]);}catch(e){}
            return(
              <div key={c.id} style={{padding:16,background:C.surface,borderRadius:12,border:`1px solid ${C.line}`,marginBottom:12}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{c.name}</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Uke {c.start_week}–{c.end_week}</div>
                {items.map((it,i)=>(
                  <div key={i} style={{padding:"8px 0",borderTop:`1px solid ${C.line}`,fontSize:13,display:"flex",justifyContent:"space-between"}}>
                    <span>{it.name}</span>
                    <span style={{color:C.muted}}>{it.price}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {/* ── FILER TAB ── */}
      {tab==="filer"&&(
        <div style={{padding:40,textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16}}>📁</div>
          <h2 style={{fontSize:18,marginBottom:8}}>Filer</h2>
          <p style={{color:C.muted,fontSize:14}}>Dokumentbibliotek kommer i neste fase.</p>
          <p style={{color:C.faint,fontSize:12,marginTop:8}}>SOPer, HMS-rutiner, kampanjebriefs og leverandørkontakter.</p>
        </div>
      )}

      <BottomNav tab={tab} setTab={setTab} role={profile?.role}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
