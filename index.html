                  </div>
                )}

                <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                  {shown.map(a=>{
                    const item=allItems.find(i=>String(i.id)===String(a.item_id));
                    const title=a.description||item?.t?.split(' — ')[0]||'Tiltak';
                    const fullItem=item?.t||'';
                    const isOpen=a.status==='open';
                    const isProg=a.status==='in_progress';
                    const isDone=a.status==='completed';
                    const dot=isOpen?C.bad:isProg?C.warn:C.ok;
                    return(
                      <div key={a.id} style={{background:C.surface,padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                          <div style={{width:8,height:8,borderRadius:4,background:dot,marginTop:7,flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:15,fontWeight:500,color:C.ink,lineHeight:1.4}}>{title}</div>
                            {fullItem.includes(' — ')&&<div style={{fontSize:13,color:C.body,marginTop:2,lineHeight:1.4}}>{fullItem.split(' — ').slice(1).join(' — ')}</div>}
                            <div style={{fontSize:12,color:C.muted,marginTop:6}}>
                              {isDone?`Lukket ${new Date(a.completed_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}`:`Opprettet ${new Date(a.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}`}
                              {a.priority==='high'&&!isDone&&<span style={{marginLeft:8,color:C.bad,fontWeight:500}}>Høy prioritet</span>}
                            </div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:8,paddingLeft:18}}>
                          {isOpen&&<>
                            <button onClick={()=>startAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.body,padding:"6px 12px",minHeight:32}}>Sett under arbeid</button>
                            <button onClick={()=>completeAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.ok,padding:"6px 12px",minHeight:32,display:"flex",alignItems:"center",gap:4}}><Icon name="check" size={14}/> Lukk</button>
                          </>}
                          {isProg&&<button onClick={()=>completeAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.ok,padding:"6px 12px",minHeight:32,display:"flex",alignItems:"center",gap:4}}><Icon name="check" size={14}/> Lukk</button>}
                          {isDone&&<button onClick={()=>reopenAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.body,padding:"6px 12px",minHeight:32}}>Åpne igjen</button>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Visit history */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:15,fontWeight:600,color:C.ink,marginBottom:12}}>Tidligere besøk</div>
            {stVisits.length===0?
              <div style={{color:C.muted,fontSize:13,padding:"20px 0",textAlign:"center"}}>Ingen besøk registrert ennå</div>
              :
              <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                {stVisits.map(v=>(
                  <div key={v.id} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:500,color:C.ink}}>
                        {v.visit_role==="rs"?"Regionssjef":"Stasjonsleder"}
                      </div>
                      <div style={{fontSize:12,color:C.muted,marginTop:2}}>{new Date(v.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"long",year:"numeric"})} · {new Date(v.created_at).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                    <button onClick={()=>generateReport(v,sv.name)} aria-label="Rapport" style={{fontSize:13,color:C.body,padding:"6px 10px",display:"flex",alignItems:"center",gap:4}}>
                      <Icon name="download" size={14}/> PDF
                    </button>
                    <div style={{fontSize:14,fontWeight:500,color:C.ink,fontVariantNumeric:"tabular-nums",minWidth:40,textAlign:"right"}}>{v.pct}%</div>
                  </div>
                ))}
              </div>
            }
          </div>
        </div>

        {/* Plan visit modal */}
        {showPlanModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowPlanModal(null)}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderTopLeftRadius:16,borderTopRightRadius:16,padding:24,width:"100%",maxWidth:720}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:20,fontWeight:600,color:C.ink,letterSpacing:-0.3}}>Planlegg besøk</div>
                <button onClick={()=>setShowPlanModal(null)} style={{color:C.muted,padding:6}}><Icon name="x" size={20}/></button>
              </div>
              <div style={{fontSize:14,color:C.body,marginBottom:20}}>{showPlanModal.station?.name}</div>

              <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Dato</label>
              <input type="date" value={planDate} onChange={e=>setPlanDate(e.target.value)} min={new Date().toISOString().slice(0,10)} style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,marginBottom:16,background:C.subtle,color:C.ink}}/>

              <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Notat <span style={{color:C.muted,fontWeight:400}}>(valgfritt)</span></label>
              <textarea value={planNote} onChange={e=>setPlanNote(e.target.value)} placeholder="Hva vil du fokusere på? Avtale med stasjonsleder?" rows={3} style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,marginBottom:24,fontFamily:"inherit",resize:"vertical",background:C.subtle,color:C.ink,lineHeight:1.5}}/>

              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setShowPlanModal(null)} style={{flex:1,padding:"13px",background:C.subtle,color:C.body,borderRadius:10,fontWeight:500,fontSize:15}}>Avbryt</button>
                <button onClick={createPlannedVisit} style={{flex:2,padding:"13px",background:C.ink,color:"#fff",borderRadius:10,fontWeight:500,fontSize:15}}>Legg til</button>
              </div>
            </div>
          </div>
        )}

        <BottomNav view={view} setView={setView} hmsCount={pendingOperCount} actionCount={openActionCount} plannedCount={myUpcomingPlanned}/>
      </div>
    );
  }
  if(view==="hms"){
    const curTertial=curT();
    const tertialInfo={t1:{name:"1. tertial",period:"Jan–Apr",endDate:"30. april"},t2:{name:"2. tertial",period:"Mai–Aug",endDate:"31. august"},t3:{name:"3. tertial",period:"Sep–Des",endDate:"31. desember"}};

    // For stasjonsleder: vis kun egen stasjon. For RS/leder: vis alle i region
    const stationsToShow=scopedStationsForUser;

    // Overall progress: hvor mange stasjoner har fullført tertialet
    const completedStations=stationsToShow.filter(s=>{
      const p=getStationHmsProgress(s.id,curTertial);
      return p.done===p.total&&p.total>0;
    }).length;

    // Stasjoner etter status (for RS-oversikt)
    const stationStatus=stationsToShow.map(s=>{
      const p=getStationHmsProgress(s.id,curTertial);
      return{...s,done:p.done,total:p.total,pct:p.total>0?Math.round(p.done/p.total*100):0};
    }).sort((a,b)=>a.pct-b.pct);

    return(
      <div style={{paddingBottom:100,background:C.bg,minHeight:"100vh"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:`1px solid ${C.line}`,background:C.surface}}>
          <img src={LC} alt="YX" style={{height:20}}/>
          <button onClick={logout} style={{fontSize:13,color:C.body,fontWeight:500,padding:"6px 0"}}>Logg ut</button>
        </div>

        <div style={{padding:"28px 20px 0"}}>
          <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>HMS</div>
          <div style={{fontSize:24,fontWeight:600,color:C.ink,letterSpacing:-0.3}}>Helse, miljø og sikkerhet</div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:2,padding:"20px 20px 0",borderBottom:`1px solid ${C.line}`,background:C.bg,position:"sticky",top:0,zIndex:10}}>
          {[['arshjul','Årshjul'],['operativt','Operativt',pendingOperCount]].map(([key,label,count])=>(
            <button key={key} onClick={()=>setHmsTab(key)} style={{padding:"12px 14px",background:"transparent",color:hmsTab===key?C.ink:C.muted,fontSize:14,fontWeight:hmsTab===key?600:400,borderBottom:`2px solid ${hmsTab===key?C.ink:"transparent"}`,marginBottom:-1,display:"flex",alignItems:"center",gap:6}}>
              {label}
              {count>0&&<span style={{background:C.red,color:"#fff",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:8,fontVariantNumeric:"tabular-nums"}}>{count}</span>}
            </button>
          ))}
        </div>

        {/* ── ÅRSHJUL ── */}
        {hmsTab==='arshjul'&&<>
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{fontSize:16,fontWeight:600,color:C.ink,marginBottom:4}}>{tertialInfo[curTertial].name}</div>
          <div style={{fontSize:13,color:C.body}}>{tertialInfo[curTertial].period} · lukkes {tertialInfo[curTertial].endDate}</div>

          <div style={{marginTop:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
              <span style={{fontSize:13,color:C.body}}>Fullført av stasjoner</span>
              <span style={{fontSize:14,fontWeight:500,color:C.ink,fontVariantNumeric:"tabular-nums"}}>{completedStations}/{stationsToShow.length}</span>
            </div>
            <div style={{height:4,background:C.line,borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:stationsToShow.length>0?(completedStations/stationsToShow.length*100)+"%":"0%",background:completedStations===stationsToShow.length?C.ok:C.ink,borderRadius:2,transition:"width .5s"}}/>
            </div>
          </div>
        </div></>}

        {/* For stasjonsleder — tertialpunkter som huk-av-liste */}
        {hmsTab==='arshjul'&&isSL&&profile.station_id&&(()=>{
          const items=HMS_DATA[curTertial].items;
          const doneCount=items.filter(it=>hmsChecks.find(c=>c.station_id===profile.station_id&&c.item_id===it.id&&c.tertial===curTertial&&c.checked)).length;
          return(
            <div style={{padding:"24px 20px 0"}}>
              <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12}}>
                <div style={{fontSize:15,fontWeight:600,color:C.ink}}>Tertialpunkter</div>
                <div style={{fontSize:13,color:C.muted,fontVariantNumeric:"tabular-nums"}}>{doneCount}/{items.length}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                {items.map(item=>{
                  const check=hmsChecks.find(c=>c.station_id===profile.station_id&&c.item_id===item.id&&c.tertial===curTertial);
                  const done=check?.checked;
                  return(
                    <button key={item.id} onClick={()=>toggleHmsCheck(profile.station_id,curTertial,item.id,!done)} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12,textAlign:"left",width:"100%"}}>
                      <div style={{width:22,height:22,borderRadius:6,border:done?`none`:`1.5px solid ${C.lineStrong}`,background:done?C.ink:"transparent",color:"#fff",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,transition:"all .15s"}}>
                        {done&&<Icon name="check" size={14} stroke={2.5}/>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:15,color:done?C.muted:C.ink,lineHeight:1.4,textDecoration:done?"line-through":"none"}}>{item.t}</div>
                        {done&&check?.checked_at&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>Gjennomført {new Date(check.checked_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}</div>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* For RS/leder — stasjonsliste etter status */}
        {hmsTab==='arshjul'&&(isRS||isLeder)&&(
          <div style={{padding:"24px 20px 0"}}>
            <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Stasjoner etter status</div>
            {stationStatus.length===0?
              <div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:14}}>Ingen stasjoner</div>
              :
              <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                {stationStatus.map(s=>{
                  const statusColor=s.pct===100?C.ok:s.pct>=60?C.warn:C.bad;
                  return(
                    <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{background:C.surface,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,textAlign:"left",width:"100%"}}>
                      <div style={{width:6,height:30,borderRadius:3,background:statusColor,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:15,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:2}}>{s.poststed}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:14,fontWeight:500,color:C.ink,fontVariantNumeric:"tabular-nums"}}>{s.done}/{s.total}</div>
                        <div style={{fontSize:12,color:C.muted,fontVariantNumeric:"tabular-nums"}}>{s.pct}%</div>
                      </div>
                      <Icon name="chevronRight" size={16} color={C.muted}/>
                    </button>
                  );
                })}
              </div>
            }
          </div>
        )}

        {/* ── OPERATIVT ── ad-hoc krav og pålegg */}
        {hmsTab==='operativt'&&(()=>{
          const active=operPoints.filter(op=>op.active);
          const pointsWithStatus=active.map(op=>{
            let targets=[];
            if(op.target_scope==='all')targets=scopedStationsForUser.map(s=>s.id);
            else if(op.target_scope==='region'&&op.target_region_ids)targets=scopedStationsForUser.filter(s=>op.target_region_ids.includes(s.region_id)).map(s=>s.id);
            else if(op.target_scope==='stations'&&op.target_station_ids)targets=op.target_station_ids.filter(id=>scopedStationIds.has(id));
            const acked=targets.filter(sid=>operAcks.find(a=>a.operative_id===op.id&&a.station_id===sid)).length;
            return{...op,targetCount:targets.length,ackedCount:acked,targets};
          }).filter(op=>op.targetCount>0);
          const pending=pointsWithStatus.filter(op=>op.ackedCount<op.targetCount);
          const completed=pointsWithStatus.filter(op=>op.ackedCount===op.targetCount&&op.targetCount>0);

          return(
            <>
              <div style={{padding:"24px 20px 0"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                  <div style={{fontSize:16,fontWeight:600,color:C.ink}}>Ad-hoc krav og pålegg</div>
                  {isLeder&&<button onClick={()=>setShowCompose(true)} style={{padding:"8px 14px",background:C.ink,color:"#fff",borderRadius:8,fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
                    <Icon name="plus" size={14}/> Nytt
                  </button>}
                </div>
              </div>

              {pending.length===0&&completed.length===0&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
                  <Icon name="bell" size={28} color={C.faint}/>
                  <div style={{fontSize:15,fontWeight:500,color:C.body,marginTop:14}}>Ingen aktive krav</div>
                  <div style={{fontSize:13,color:C.muted,marginTop:6,maxWidth:320,margin:"6px auto 0",lineHeight:1.5}}>Ad-hoc krav som skimming, IK-mat og smittevern dukker opp her når sentralt sender dem ut.</div>
                </div>
              )}

              {pending.length>0&&(
                <div style={{padding:"0 20px 16px"}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Aktive</div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {pending.map(op=>{
                      const daysLeft=op.due_date?Math.ceil((new Date(op.due_date)-new Date())/(86400000)):null;
                      const urgent=daysLeft!==null&&daysLeft<=2;
                      const high=op.priority==='high'||op.priority==='critical';
                      return(
                        <div key={op.id} style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:12,padding:"16px 18px"}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:6}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:16,fontWeight:500,color:C.ink,lineHeight:1.4}}>{op.title}</div>
                            </div>
                            {high&&<span style={{fontSize:11,fontWeight:500,color:C.bad,padding:"2px 8px",background:C.badSoft,borderRadius:4,flexShrink:0}}>Høy</span>}
                          </div>
                          {op.description&&<div style={{fontSize:14,color:C.body,marginBottom:12,whiteSpace:"pre-wrap",lineHeight:1.5}}>{op.description}</div>}
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,color:C.muted,marginBottom:8}}>
                            <span style={{fontVariantNumeric:"tabular-nums"}}>{op.ackedCount}/{op.targetCount} kvittert</span>
                            {op.due_date&&<span style={{color:urgent?C.bad:C.muted,fontWeight:urgent?500:400}}>
                              {daysLeft<0?`Forfalt ${Math.abs(daysLeft)} d`:daysLeft===0?"Frist i dag":`${daysLeft} d igjen`}
                            </span>}
                          </div>
                          <div style={{height:3,background:C.line,borderRadius:2,overflow:"hidden"}}>
                            <div style={{height:"100%",width:(op.ackedCount/op.targetCount*100)+"%",background:C.ink,borderRadius:2}}/>
                          </div>
                          {op.targets.length>0&&(
                            <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${C.line}`}}>
                              {op.targets.map(sid=>{
                                const st=stations.find(s=>s.id===sid);
                                if(!st)return null;
                                const ack=getOpAck(op.id,sid);
                                return(
                                  <div key={sid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
                                    <div style={{fontSize:14,color:C.body,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name}</div>
                                    {ack?<span style={{fontSize:12,color:C.ok,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
                                      <Icon name="check" size={14} color={C.ok}/> {new Date(ack.acknowledged_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}
                                    </span>:
                                      <button onClick={()=>ackOperative(op.id,sid,null,null)} style={{fontSize:13,fontWeight:500,color:"#fff",background:C.ink,padding:"7px 14px",borderRadius:8,minHeight:32}}>Kvitter ut</button>}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {completed.length>0&&(
                <div style={{padding:"16px 20px 0"}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Fullført</div>
                  <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                    {completed.map(op=>(
                      <div key={op.id} style={{background:C.surface,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                        <div style={{flex:1,minWidth:0,fontSize:14,color:C.body,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{op.title}</div>
                        <span style={{fontSize:12,color:C.ok,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
                          <Icon name="check" size={14} color={C.ok}/> {op.ackedCount}/{op.targetCount}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Compose modal */}
              {showCompose&&(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowCompose(false)}>
                  <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderTopLeftRadius:16,borderTopRightRadius:16,padding:24,width:"100%",maxWidth:720,maxHeight:"90vh",overflow:"auto"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                      <div style={{fontSize:20,fontWeight:600,color:C.ink,letterSpacing:-0.3}}>Nytt operativt punkt</div>
                      <button onClick={()=>setShowCompose(false)} style={{color:C.muted,padding:6}}><Icon name="x" size={20}/></button>
                    </div>
                    <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Tittel</label>
                    <input type="text" value={composeForm.title} onChange={e=>setComposeForm(f=>({...f,title:e.target.value}))} placeholder="F.eks. Sjekk for skimmingutstyr" style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,marginBottom:16,background:C.subtle,color:C.ink}}/>
                    <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Beskrivelse</label>
                    <textarea value={composeForm.description} onChange={e=>setComposeForm(f=>({...f,description:e.target.value}))} placeholder="Detaljer, hva må gjøres, referanser" rows={4} style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,marginBottom:16,fontFamily:"inherit",resize:"vertical",background:C.subtle,color:C.ink,lineHeight:1.5}}/>
                    <div style={{display:"flex",gap:10,marginBottom:16}}>
                      <div style={{flex:1}}>
                        <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Prioritet</label>
                        <select value={composeForm.priority} onChange={e=>setComposeForm(f=>({...f,priority:e.target.value}))} style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,background:C.subtle,color:C.ink}}>
                          <option value="low">Lav</option>
                          <option value="medium">Medium</option>
                          <option value="high">Høy</option>
                          <option value="critical">Kritisk</option>
                        </select>
                      </div>
                      <div style={{flex:1}}>
                        <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Frist</label>
                        <input type="date" value={composeForm.due_date} onChange={e=>setComposeForm(f=>({...f,due_date:e.target.value}))} style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,background:C.subtle,color:C.ink}}/>
                      </div>
                    </div>
                    <label style={{display:"block",fontSize:13,fontWeight:500,color:C.body,marginBottom:6}}>Målgruppe</label>
                    <select value={composeForm.target_scope} onChange={e=>setComposeForm(f=>({...f,target_scope:e.target.value}))} style={{width:"100%",padding:"12px 14px",fontSize:15,border:`1px solid ${C.line}`,borderRadius:10,marginBottom:24,background:C.subtle,color:C.ink}}>
                      <option value="all">Alle stasjoner</option>
                      <option value="region" disabled>Én region (kommer)</option>
                      <option value="stations" disabled>Utvalgte stasjoner (kommer)</option>
                    </select>
                    <div style={{display:"flex",gap:10}}>
                      <button onClick={()=>setShowCompose(false)} style={{flex:1,padding:"13px",background:C.subtle,color:C.body,borderRadius:10,fontWeight:500,fontSize:15}}>Avbryt</button>
                      <button onClick={createOperative} style={{flex:2,padding:"13px",background:C.red,color:"#fff",borderRadius:10,fontWeight:500,fontSize:15}}>Send ut</button>
                    </div>
                  </div>
                </div>
              )}
            </>
          );
        })()}

        <BottomNav view={view} setView={setView} hmsCount={pendingOperCount} actionCount={openActionCount} plannedCount={myUpcomingPlanned}/>
      </div>
    );
  }

  /* ── ALLE TILTAK (på tvers av stasjoner) ── */
  if(view==="actions"){
    const myActions=actions.filter(a=>scopedStationIds.has(a.station_id));
    const openA=myActions.filter(a=>a.status==='open');
    const inProgA=myActions.filter(a=>a.status==='in_progress');
    const doneA=myActions.filter(a=>a.status==='completed');
    const shown=actionTab==='open'?openA:actionTab==='in_progress'?inProgA:doneA;

    return(
      <div style={{paddingBottom:100,background:C.bg,minHeight:"100vh"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:`1px solid ${C.line}`,background:C.surface}}>
          <img src={LC} alt="YX" style={{height:20}}/>
          <button onClick={logout} style={{fontSize:13,color:C.body,fontWeight:500,padding:"6px 0"}}>Logg ut</button>
        </div>

        <div style={{padding:"28px 20px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Alle tiltak</div>
          <div style={{fontSize:26,fontWeight:600,color:C.ink,letterSpacing:-0.3}}>{myRegion?`Region ${myRegion.name}`:"Alle regioner"}</div>
        </div>

        <div style={{padding:"0 20px"}}>
          {/* Underline tabs */}
          <div style={{display:"flex",gap:2,marginBottom:16,borderBottom:`1px solid ${C.line}`}}>
            {[['open','Åpne',openA.length],['in_progress','Under arbeid',inProgA.length],['completed','Lukket',doneA.length]].map(([key,label,count])=>(
              <button key={key} onClick={()=>setActionTab(key)} style={{padding:"12px 14px",background:"transparent",color:actionTab===key?C.ink:C.muted,fontSize:14,fontWeight:actionTab===key?600:400,borderBottom:`2px solid ${actionTab===key?C.ink:"transparent"}`,marginBottom:-1}}>
                {label} <span style={{color:C.muted,fontVariantNumeric:"tabular-nums",marginLeft:2}}>{count}</span>
              </button>
            ))}
          </div>

          {shown.length===0?
            <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
              <Icon name="list" size={28} color={C.faint}/>
              <div style={{fontSize:14,marginTop:12}}>Ingen tiltak</div>
            </div>
            :
            <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
              {shown.map(a=>{
                const st=stations.find(s=>s.id===a.station_id);
                const allItems=JOURNEY.flatMap(j=>j.items).concat(HMS_DATA.t1.items,HMS_DATA.t2.items,HMS_DATA.t3.items);
                const item=allItems.find(i=>String(i.id)===String(a.item_id));
                const title=a.description||item?.t?.split(' — ')[0]||'Tiltak';
                const dot=a.status==='open'?C.bad:a.status==='in_progress'?C.warn:C.ok;
                return(
                  <div key={a.id} style={{background:C.surface,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                      <div style={{width:8,height:8,borderRadius:4,background:dot,marginTop:7,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,color:C.muted,marginBottom:2}}>{st?.name||"Ukjent stasjon"}</div>
                        <div style={{fontSize:15,fontWeight:500,color:C.ink,lineHeight:1.4}}>{title}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:4}}>
                          Opprettet {new Date(a.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}
                          {a.priority==='high'&&<span style={{marginLeft:8,color:C.bad,fontWeight:500}}>Høy prioritet</span>}
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:12,paddingLeft:18,flexWrap:"wrap"}}>
                      {a.status==='open'&&<>
                        <button onClick={()=>startAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.body,padding:"6px 12px",minHeight:32}}>Sett under arbeid</button>
                        <button onClick={()=>completeAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.ok,padding:"6px 12px",minHeight:32,display:"flex",alignItems:"center",gap:4}}><Icon name="check" size={14}/> Lukk</button>
                      </>}
                      {a.status==='in_progress'&&<button onClick={()=>completeAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.ok,padding:"6px 12px",minHeight:32,display:"flex",alignItems:"center",gap:4}}><Icon name="check" size={14}/> Lukk</button>}
                      {a.status==='completed'&&<button onClick={()=>reopenAction(a.id)} style={{fontSize:13,fontWeight:500,color:C.body,padding:"6px 12px",minHeight:32}}>Åpne igjen</button>}
                      {st&&<button onClick={()=>{setStationView(st);setView("stationDetail");}} style={{fontSize:13,fontWeight:500,color:C.muted,padding:"6px 12px",display:"flex",alignItems:"center",gap:4,marginLeft:"auto"}}>Se stasjon <Icon name="chevronRight" size={14}/></button>}
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>

        <BottomNav view={view} setView={setView} hmsCount={pendingOperCount} actionCount={openActionCount} plannedCount={myUpcomingPlanned}/>
      </div>
    );
  }

  if(view==="dash"){
    const scopedStations=isRS&&profile?.region_id?stations.filter(s=>s.region_id===profile.region_id):stations;
    const scopedIds=new Set(scopedStations.map(s=>s.id));
    const rsV=visits.filter(v=>v.visit_role==="rs"&&scopedIds.has(v.station_id));
    const slV=visits.filter(v=>v.visit_role==="sl"&&scopedIds.has(v.station_id));
    const stScores=scopedStations.map(s=>{
      const lastRS=rsV.find(v=>v.station_id===s.id);
      const lastSL=slV.find(v=>v.station_id===s.id);
      const gap=lastRS&&lastSL?lastSL.pct-lastRS.pct:null;
      return{...s,lastRS,lastSL,gap};
    }).filter(s=>s.lastRS||s.lastSL).sort((a,b)=>(a.lastRS?.pct??a.lastSL?.pct??100)-(b.lastRS?.pct??b.lastSL?.pct??100));
    const avgRS=rsV.length?Math.round(rsV.reduce((s,v)=>s+v.pct,0)/rsV.length):0;
    const avgSL=slV.length?Math.round(slV.reduce((s,v)=>s+v.pct,0)/slV.length):0;
    const visited=new Set(rsV.concat(slV).map(v=>v.station_id)).size;

    return(
      <div style={{paddingBottom:100,background:C.bg,minHeight:"100vh"}}>
        {/* Header */}
        <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <img src={LC} alt="YX" style={{height:20}}/>
          <button onClick={logout} style={{fontSize:13,color:C.body,fontWeight:500,padding:"6px 0"}}>Logg ut</button>
        </div>

        {/* Page header */}
        <div style={{padding:"28px 20px 24px",background:C.surface,borderBottom:`1px solid ${C.line}`}}>
          <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Dashboard</div>
          <div style={{fontSize:24,fontWeight:600,color:C.ink,letterSpacing:-0.3,marginBottom:2}}>{myRegion?`Region ${myRegion.name}`:"Alle regioner"}</div>
          <div style={{fontSize:13,color:C.body}}>{scopedStations.length} stasjoner · {visited} besøkt</div>

          {/* KPIs — inline, no boxes */}
          <div style={{display:"flex",gap:32,marginTop:24,paddingTop:20,borderTop:`1px solid ${C.line}`}}>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>RS-besøk</div>
              <div style={{fontSize:24,fontWeight:600,color:C.ink,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{rsV.length}</div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>RS-snitt</div>
              <div style={{fontSize:24,fontWeight:600,color:C.ink,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{avgRS}%</div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>SL-snitt</div>
              <div style={{fontSize:24,fontWeight:600,color:C.ink,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{avgSL?avgSL+"%":"—"}</div>
            </div>
          </div>
        </div>

        <div style={{padding:"24px 20px"}}>
          {stScores.length===0?
            <div style={{textAlign:"center",padding:"60px 20px",color:C.muted,fontSize:14}}>Ingen besøk registrert ennå</div>
            :
            <>
              {/* Top / Bottom */}
              {stScores.length>=3&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:24,marginBottom:32}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Høyest score</div>
                    <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                      {[...stScores].sort((a,b)=>(b.lastSL?.pct??0)-(a.lastSL?.pct??0)).slice(0,3).map(s=>(
                        <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{background:C.surface,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left",gap:8}}>
                          <div style={{fontSize:14,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{s.name}</div>
                          <div style={{fontSize:14,fontWeight:500,color:C.ok,fontVariantNumeric:"tabular-nums"}}>{s.lastSL?.pct}%</div>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Trenger oppfølging</div>
                    <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                      {[...stScores].sort((a,b)=>(a.lastSL?.pct??100)-(b.lastSL?.pct??100)).slice(0,3).map(s=>(
                        <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{background:C.surface,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left",gap:8}}>
                          <div style={{fontSize:14,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{s.name}</div>
                          <div style={{fontSize:14,fontWeight:500,color:C.bad,fontVariantNumeric:"tabular-nums"}}>{s.lastSL?.pct}%</div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* Score per område */}
              {(()=>{
                const allV=slV.filter(v=>v.scores&&Object.keys(v.scores).length>0);
                if(!allV.length)return null;
                const areas=JOURNEY.map(j=>{
                  let tot=0,max=0;
                  allV.forEach(v=>{j.items.forEach(item=>{const s=v.scores?.[String(item.id)];if(s!==undefined&&!v.na_items?.includes(String(item.id))){tot+=s;max+=item.max;}});});
                  return{name:j.name,pct:max>0?Math.round(tot/max*100):0};
                });
                return(
                  <div style={{marginBottom:32}}>
                    <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Score per område</div>
                    <div style={{display:"flex",flexDirection:"column",gap:14,padding:"4px 0"}}>
                      {areas.map(a=>(
                        <div key={a.name} style={{display:"flex",alignItems:"center",gap:12}}>
                          <div style={{flex:1,fontSize:14,color:C.ink}}>{a.name}</div>
                          <div style={{width:140,height:4,background:C.line,borderRadius:2,overflow:"hidden"}}>
                            <div style={{height:"100%",background:C.ink,width:a.pct+"%",borderRadius:2,transition:"width .5s"}}/>
                          </div>
                          <div style={{fontSize:14,fontWeight:500,color:C.ink,fontVariantNumeric:"tabular-nums",width:40,textAlign:"right"}}>{a.pct}%</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* Score per spørsmål */}
              {(()=>{
                const allV=slV.filter(v=>v.scores&&Object.keys(v.scores).length>0);
                if(!allV.length)return null;
                const qScores=JOURNEY.flatMap(j=>j.items.map(item=>{
                  let tot=0,cnt=0;
                  allV.forEach(v=>{const s=v.scores?.[String(item.id)];if(s!==undefined&&!v.na_items?.includes(String(item.id))){tot+=s;cnt++;}});
                  const pct=cnt>0?Math.round(tot/(cnt*item.max)*100):null;
                  return{...item,pct,cnt,areaName:j.name};
                })).filter(q=>q.pct!==null).sort((a,b)=>a.pct-b.pct).slice(0,10);
                return(
                  <div style={{marginBottom:32}}>
                    <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Svakeste spørsmål</div>
                    <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Topp 10, lavest først</div>
                    <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                      {qScores.map(q=>{
                        const parts=q.t.split(" — ");
                        return(
                          <div key={q.id} style={{background:C.surface,padding:"12px 14px"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:14,fontWeight:500,color:C.ink,lineHeight:1.4}}>{parts[0]}</div>
                                <div style={{fontSize:12,color:C.muted,marginTop:2}}>{q.areaName}</div>
                              </div>
                              <div style={{fontSize:14,fontWeight:500,color:C.ink,fontVariantNumeric:"tabular-nums",flexShrink:0}}>{q.pct}%</div>
                            </div>
                            <div style={{height:3,background:C.line,borderRadius:1.5,overflow:"hidden"}}>
                              <div style={{height:"100%",background:q.pct<50?C.bad:q.pct<75?C.warn:C.ink,width:q.pct+"%",borderRadius:1.5,transition:"width .5s"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* Gap analyse */}
              {stScores.filter(s=>s.gap!==null).length>0&&(
                <div style={{marginBottom:32}}>
                  <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Avvik mellom SL og RS</div>
                  <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Størst avvik først</div>
                  <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                    {stScores.filter(s=>s.gap!==null).sort((a,b)=>Math.abs(b.gap)-Math.abs(a.gap)).slice(0,10).map(s=>{
                      const gapColor=Math.abs(s.gap)>15?C.bad:Math.abs(s.gap)>5?C.warn:C.ok;
                      return(
                        <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{background:C.surface,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                          <div style={{flex:1,minWidth:0,fontSize:14,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                          <div style={{fontSize:12,color:C.muted,fontVariantNumeric:"tabular-nums"}}>SL {s.lastSL.pct}% · RS {s.lastRS.pct}%</div>
                          <div style={{fontSize:13,fontWeight:500,color:gapColor,fontVariantNumeric:"tabular-nums",minWidth:44,textAlign:"right"}}>{s.gap>0?"+":""}{s.gap}pp</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Alle stasjoner rangert */}
              <div>
                <div style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Alle stasjoner</div>
                <div style={{display:"flex",flexDirection:"column",gap:1,background:C.line,border:`1px solid ${C.line}`,borderRadius:10,overflow:"hidden"}}>
                  {stScores.map(s=>(
                    <button key={s.id} onClick={()=>{setStationView(s);setView("stationDetail");}} style={{background:C.surface,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:500,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:2}}>{s.lastRS?`Besøkt ${new Date(s.lastRS.created_at).toLocaleDateString("nb-NO",{day:"numeric",month:"short"})}`:"Ikke besøkt"}</div>
                      </div>
                      <div style={{display:"flex",gap:12,fontSize:13,fontVariantNumeric:"tabular-nums"}}>
                        {s.lastSL&&<div style={{color:C.body}}>SL <span style={{color:C.ink,fontWeight:500}}>{s.lastSL.pct}%</span></div>}
                        {s.lastRS&&<div style={{color:C.body}}>RS <span style={{color:C.ink,fontWeight:500}}>{s.lastRS.pct}%</span></div>}
                      </div>
                      <Icon name="chevronRight" size={16} color={C.muted}/>
                    </button>
                  ))}
                </div>
              </div>
            </>
          }
        </div>

        <BottomNav view={view} setView={setView} hmsCount={pendingOperCount} actionCount={openActionCount} plannedCount={myUpcomingPlanned}/>
      </div>
    );
  }

  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
